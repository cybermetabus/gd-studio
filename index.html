<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GD TTS Studio v5.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a2e; color:#eee; font-family:'Segoe UI',sans-serif; padding:20px; max-width:900px; margin:0 auto; }
h1 { text-align:center; color:#e94560; margin-bottom:5px; }
.version { text-align:center; color:#888; font-size:13px; margin-bottom:20px; }
.section { background:#16213e; border-radius:10px; padding:20px; margin-bottom:15px; }
.section h2 { color:#e94560; margin-bottom:10px; font-size:16px; }
label { display:block; color:#aaa; font-size:13px; margin-bottom:5px; }
input[type=text], textarea, select { width:100%; background:#0f3460; border:1px solid #333; color:#eee; border-radius:6px; padding:10px; font-size:14px; }
select { cursor:pointer; }
textarea { height:200px; resize:vertical; font-family:'Courier New',monospace; line-height:1.6; font-size:12px; }
.style-textarea { height:80px; margin-top:8px; font-family:'Segoe UI',sans-serif; }
.btn { padding:12px 24px; border:none; border-radius:6px; font-size:15px; font-weight:bold; cursor:pointer; margin:5px; }
.btn-start { background:#e94560; color:#fff; }
.btn-start:hover { background:#c73652; }
.btn-start:disabled { background:#555; cursor:not-allowed; }
.btn-download { background:#4ecca3; color:#1a1a2e; }
.btn-download:hover { background:#3ba884; }
.btn-download:disabled { background:#555; color:#888; cursor:not-allowed; }
.btn-stop { background:#ff6b35; color:#fff; }
.btn-secondary { background:#0f3460; color:#4ecca3; border:1px solid #4ecca3; }
.btn-secondary:hover { background:#4ecca3; color:#1a1a2e; }
.controls { text-align:center; margin:15px 0; }
.progress-bar { width:100%; height:30px; background:#0f3460; border-radius:15px; overflow:hidden; margin:10px 0; }
.progress-fill { height:100%; background:linear-gradient(90deg,#e94560,#4ecca3); transition:width 0.5s; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:bold; }
.stats { display:flex; justify-content:space-around; flex-wrap:wrap; gap:10px; margin:10px 0; }
.stat-box { background:#0f3460; padding:10px 15px; border-radius:8px; text-align:center; min-width:100px; }
.stat-num { font-size:22px; font-weight:bold; color:#4ecca3; }
.stat-label { font-size:11px; color:#888; }
#log { background:#000; border-radius:6px; padding:10px; height:250px; overflow-y:auto; font-family:'Courier New',monospace; font-size:12px; line-height:1.6; }
.log-ok { color:#4ecca3; }
.log-err { color:#e94560; }
.log-warn { color:#f0a500; }
.log-info { color:#aaa; }
.results { margin-top:10px; }
.result-item { background:#0f3460; border-radius:6px; padding:10px; margin:5px 0; display:flex; justify-content:space-between; align-items:center; }
.result-item .info { flex:1; }
.result-item .info .title { font-weight:bold; color:#4ecca3; }
.result-item .info .preview { color:#888; font-size:12px; margin-top:3px; }
.result-item audio { margin-left:10px; }
.settings-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
.settings-row > div { flex:1; min-width:150px; }
.key-status { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
.key-badge { padding:4px 10px; border-radius:12px; font-size:11px; font-weight:bold; }
.key-active { background:#4ecca3; color:#1a1a2e; }
.key-wait { background:#0f3460; color:#888; }
.key-dead { background:#e94560; color:#fff; }
.style-preview { background:#0f3460; border-radius:6px; padding:10px; margin-top:8px; color:#4ecca3; font-size:13px; font-style:italic; min-height:40px; }
.checkbox-row { display:flex; align-items:center; gap:8px; margin-top:10px; }
.checkbox-row input[type=checkbox] { width:18px; height:18px; cursor:pointer; }
.checkbox-row label { margin:0; cursor:pointer; color:#eee; font-size:14px; }
.file-upload { border:2px dashed #4ecca3; border-radius:8px; padding:20px; text-align:center; cursor:pointer; transition:background 0.3s; }
.file-upload:hover { background:#0f3460; }
.file-upload.loaded { border-color:#e94560; background:#1e1e3a; }
.scene-list { max-height:200px; overflow-y:auto; margin-top:10px; }
.scene-item { background:#0f3460; border-radius:4px; padding:6px 10px; margin:3px 0; font-size:12px; display:flex; justify-content:space-between; }
.scene-item .scene-id { color:#4ecca3; font-weight:bold; min-width:80px; }
.scene-item .scene-preview { color:#888; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-left:10px; }
.scene-item .scene-chars { color:#f0a500; min-width:50px; text-align:right; }
.chunk-list { margin-top:10px; }
.chunk-item { background:#0f3460; border-radius:6px; padding:8px 12px; margin:4px 0; font-size:12px; }
.chunk-item .chunk-title { color:#e94560; font-weight:bold; }
.chunk-item .chunk-scenes { color:#888; margin-top:3px; }
.chunk-item .chunk-chars { color:#4ecca3; }
</style>
</head>
<body>

<h1>GD TTS Studio</h1>
<div class="version">v5.0 — JSON 씬 대본 | Pro TTS | 멀티키 | 씬 매핑 | 자동 다운로드</div>

<!-- 1. API 키 -->
<div class="section">
  <h2>1. API 키</h2>
  <label>Gemini API Key — 여러 개 입력 시 쉼표(,)로 구분</label>
  <input type="text" id="apiKey" placeholder="AIza...key1, AIza...key2, AIza...key3">
  <div class="key-status" id="keyStatus"></div>
</div>

<!-- 2. JSON 대본 업로드 -->
<div class="section">
  <h2>2. 씬 대본 (JSON)</h2>
  <div class="file-upload" id="fileUpload" onclick="document.getElementById('jsonFile').click()">
    <div style="font-size:24px; margin-bottom:8px;">📄</div>
    <div>JSON 파일을 클릭하여 업로드하거나, 아래에 직접 붙여넣기</div>
    <input type="file" id="jsonFile" accept=".json" style="display:none" onchange="handleFileUpload(event)">
  </div>
  <textarea id="jsonInput" placeholder='{"scene-01": "대사...", "scene-02": "대사...", ...}' style="margin-top:10px;"></textarea>
  <div class="controls" style="margin-top:8px;">
    <button class="btn btn-secondary" onclick="parseJSON()">JSON 파싱</button>
  </div>
  <div style="margin-top:8px; color:#888; font-size:12px;">
    씬: <span id="sceneCount">0</span>개 | 총 글자: <span id="totalChars">0</span>자 | 예상 청크: <span id="chunkCount">0</span>개
  </div>
  <div class="scene-list" id="sceneList"></div>
</div>

<!-- 3. 청크 미리보기 -->
<div class="section" id="chunkSection" style="display:none;">
  <h2>3. 청크 분할 미리보기</h2>
  <div class="chunk-list" id="chunkList"></div>
</div>

<!-- 4. 스타일 & 설정 -->
<div class="section">
  <h2>4. 음성 스타일 & 설정</h2>
  <label>음성 스타일 선택</label>
  <select id="styleSelect" onchange="onStyleChange()">
    <option value="yadam">야담톤 — 구연동화 스타일, 온화하고 정겹게</option>
    <option value="radio">라디오사연톤 — 라디오 사연 낭독, 맛깔나게</option>
    <option value="senior">시니어사연톤 — 또박또박, 정겨운 목소리</option>
    <option value="custom">직접 입력</option>
  </select>
  <div class="style-preview" id="stylePreview">구연동화를 읽는 것처럼, 온화한 목소리로 아주 천천히 또박또박 정겹게 읽어줘.</div>
  <textarea class="style-textarea" id="customStyle" style="display:none;" placeholder="원하는 스타일을 직접 입력하세요..."></textarea>

  <div class="settings-row" style="margin-top:12px;">
    <div>
      <label>분할 단위 (자)</label>
      <input type="text" id="chunkSize" value="1500">
    </div>
    <div>
      <label>요청 간격 (초)</label>
      <input type="text" id="requestDelay" value="25">
    </div>
    <div>
      <label>Temperature</label>
      <input type="text" id="temperature" value="1.35">
    </div>
  </div>
  <div class="checkbox-row">
    <input type="checkbox" id="autoDownload" checked>
    <label for="autoDownload">청크 완료 시 WAV 자동 개별 다운로드</label>
  </div>
</div>

<!-- 5. TTS 생성 -->
<div class="section">
  <h2>5. TTS 생성</h2>
  <div class="controls">
    <button class="btn btn-start" id="btnStart" onclick="startTTS()">TTS 생성 시작</button>
    <button class="btn btn-stop" id="btnStop" onclick="stopTTS()" style="display:none;">중지</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%;">0%</div></div>
  <div class="stats">
    <div class="stat-box"><div class="stat-num" id="statTotal">0</div><div class="stat-label">전체</div></div>
    <div class="stat-box"><div class="stat-num" id="statDone">0</div><div class="stat-label">완료</div></div>
    <div class="stat-box"><div class="stat-num" id="statFail">0</div><div class="stat-label">실패</div></div>
    <div class="stat-box"><div class="stat-num" id="statTime">0:00</div><div class="stat-label">경과</div></div>
  </div>
  <div id="log"></div>
</div>

<!-- 6. 결과 -->
<div class="section">
  <h2>6. 결과</h2>
  <div class="controls">
    <button class="btn btn-download" id="btnDownloadZip" onclick="downloadZip()" disabled>전체 ZIP 다운로드 (WAV + 매핑)</button>
    <button class="btn btn-download" id="btnDownloadMapping" onclick="downloadMapping()" disabled>씬 매핑 JSON 다운로드</button>
  </div>
  <div class="results" id="results"></div>
</div>

<script>
// ─── 스타일 프리셋 ───
const STYLE_PRESETS = {
  yadam: '구연동화를 읽는 것처럼, 온화한 목소리로 아주 천천히 또박또박 정겹게 읽어줘.',
  radio: '라디오에서 사연을 읽어주는 스타일로, 대사는 맛깔나게 읽어줘.',
  senior: '시니어들이 잘 알아들을 수 있게 정겨운 목소리로 또박또박 읽어줘.'
};

function onStyleChange() {
  const sel = document.getElementById('styleSelect').value;
  const preview = document.getElementById('stylePreview');
  const custom = document.getElementById('customStyle');
  if (sel === 'custom') {
    preview.style.display = 'none';
    custom.style.display = 'block';
    custom.value = '';
    custom.focus();
  } else {
    preview.style.display = 'block';
    custom.style.display = 'none';
    preview.textContent = STYLE_PRESETS[sel];
  }
}

function getStyleText() {
  const sel = document.getElementById('styleSelect').value;
  if (sel === 'custom') return document.getElementById('customStyle').value.trim();
  return STYLE_PRESETS[sel];
}

// ─── 전역 변수 ───
let scenes = {};         // { "scene-01": "텍스트", ... }
let sceneOrder = [];     // ["scene-01", "scene-02", ...]
let chunks = [];         // [{ text, scenes: ["scene-01",...], texts: {} }]
let chunkMapping = [];   // 최종 매핑 데이터
let audioBlobs = {};
let isRunning = false;
let isStopped = false;
let startTime = 0;
let timerInterval = null;
let apiKeys = [];
let currentKeyIndex = 0;
let keyUsage = {};

const VOICE = 'Zephyr';
const API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro-preview-tts:generateContent';

// ─── 유틸 ───
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function addLog(msg, type='info') {
  const log = document.getElementById('log');
  const line = document.createElement('div');
  line.className = 'log-' + type;
  const now = new Date().toLocaleTimeString('ko-KR');
  line.textContent = `[${now}] ${msg}`;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

function generateId(len=10) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_';
  let result = '';
  for (let i = 0; i < len; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
  return result;
}

function autoDownloadFile(blob, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ─── JSON 파일 업로드 ───
function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('jsonInput').value = e.target.result;
    document.getElementById('fileUpload').classList.add('loaded');
    document.querySelector('#fileUpload div:first-child').textContent = '✅';
    document.querySelector('#fileUpload div:last-of-type').textContent = file.name + ' 로드됨';
    parseJSON();
  };
  reader.readAsText(file);
}

// ─── JSON 파싱 ───
function parseJSON() {
  const raw = document.getElementById('jsonInput').value.trim();
  if (!raw) { alert('JSON을 입력하세요.'); return; }

  try {
    scenes = JSON.parse(raw);
  } catch(e) {
    alert('JSON 파싱 에러: ' + e.message);
    return;
  }

  // 씬 순서 정렬 (scene-01, scene-02, ...)
  sceneOrder = Object.keys(scenes).sort((a, b) => {
    const numA = parseInt(a.replace(/\D/g, '')) || 0;
    const numB = parseInt(b.replace(/\D/g, '')) || 0;
    return numA - numB;
  });

  if (sceneOrder.length === 0) { alert('씬이 없습니다.'); return; }

  // 괄호 내용 제거
  function cleanText(text) {
    text = text.replace(/\[.*?\]/g, '');
    text = text.replace(/【.*?】/g, '');
    text = text.replace(/\(.*?\)/g, '');
    text = text.replace(/\\n/g, '\n');
    text = text.replace(/\n{3,}/g, '\n\n');
    return text.trim();
  }

  // 씬 텍스트 정리
  for (const key of sceneOrder) {
    scenes[key] = cleanText(scenes[key]);
  }

  // 통계 표시
  let totalChars = 0;
  const listEl = document.getElementById('sceneList');
  listEl.innerHTML = '';

  for (const key of sceneOrder) {
    const text = scenes[key];
    totalChars += text.length;
    const div = document.createElement('div');
    div.className = 'scene-item';
    div.innerHTML = `
      <span class="scene-id">${key}</span>
      <span class="scene-preview">${text.substring(0, 60)}...</span>
      <span class="scene-chars">${text.length}자</span>
    `;
    listEl.appendChild(div);
  }

  const chunkSize = parseInt(document.getElementById('chunkSize').value) || 1500;
  document.getElementById('sceneCount').textContent = sceneOrder.length;
  document.getElementById('totalChars').textContent = totalChars;
  document.getElementById('chunkCount').textContent = Math.ceil(totalChars / chunkSize);

  // 청크 분할
  buildChunks();
}

// ─── 씬을 청크로 묶기 ───
function buildChunks() {
  const maxLen = parseInt(document.getElementById('chunkSize').value) || 1500;
  chunks = [];
  let currentChunk = { text: '', scenes: [], texts: {} };

  for (const key of sceneOrder) {
    const sceneText = scenes[key];
    const combined = currentChunk.text ? currentChunk.text + '\n' + sceneText : sceneText;

    if (combined.length > maxLen && currentChunk.text.length > 0) {
      // 현재 청크 저장, 새 청크 시작
      chunks.push(currentChunk);
      currentChunk = { text: sceneText, scenes: [key], texts: {} };
      currentChunk.texts[key] = sceneText;
    } else {
      currentChunk.text = combined;
      currentChunk.scenes.push(key);
      currentChunk.texts[key] = sceneText;
    }
  }
  if (currentChunk.text.length > 0) chunks.push(currentChunk);

  // 청크 미리보기 표시
  const chunkSection = document.getElementById('chunkSection');
  const chunkListEl = document.getElementById('chunkList');
  chunkSection.style.display = 'block';
  chunkListEl.innerHTML = '';

  chunks.forEach((chunk, i) => {
    const div = document.createElement('div');
    div.className = 'chunk-item';
    div.innerHTML = `
      <div class="chunk-title">청크 ${String(i+1).padStart(3,'0')} <span class="chunk-chars">(${chunk.text.length}자)</span></div>
      <div class="chunk-scenes">씬: ${chunk.scenes.join(', ')}</div>
    `;
    chunkListEl.appendChild(div);
  });

  document.getElementById('chunkCount').textContent = chunks.length;
}

// ─── 키 상태 ───
function updateKeyStatus() {
  const container = document.getElementById('keyStatus');
  container.innerHTML = '';
  apiKeys.forEach((key, i) => {
    const badge = document.createElement('span');
    badge.className = 'key-badge';
    const usage = keyUsage[i] || 0;
    if (i === currentKeyIndex) {
      badge.className += ' key-active';
      badge.textContent = `키${i+1}: 사용중 (${usage}건)`;
    } else if (keyUsage[i] === 'dead') {
      badge.className += ' key-dead';
      badge.textContent = `키${i+1}: 소진`;
    } else {
      badge.className += ' key-wait';
      badge.textContent = `키${i+1}: 대기 (${usage}건)`;
    }
    container.appendChild(badge);
  });
}

function switchToNextKey(reason) {
  const oldIndex = currentKeyIndex;
  for (let i = 1; i <= apiKeys.length; i++) {
    const nextIndex = (currentKeyIndex + i) % apiKeys.length;
    if (keyUsage[nextIndex] !== 'dead') {
      currentKeyIndex = nextIndex;
      addLog(`⚠ 키${oldIndex+1} ${reason} → 키${currentKeyIndex+1}로 전환`, 'warn');
      updateKeyStatus();
      return true;
    }
  }
  addLog(`● 모든 키 소진!`, 'err');
  return false;
}

// ─── WAV 변환 ───
function pcmToWav(pcmData, sampleRate=24000, numChannels=1, bitsPerSample=16) {
  const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
  const blockAlign = numChannels * (bitsPerSample / 8);
  const dataSize = pcmData.byteLength;
  const buffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buffer);
  function writeStr(offset, str) { for(let i=0;i<str.length;i++) view.setUint8(offset+i, str.charCodeAt(i)); }
  writeStr(0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, byteRate, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bitsPerSample, true);
  writeStr(36, 'data');
  view.setUint32(40, dataSize, true);
  new Uint8Array(buffer, 44).set(new Uint8Array(pcmData));
  return new Blob([buffer], { type: 'audio/wav' });
}

// ─── TTS API 호출 ───
async function callTTS(text, apiKey, temperature, styleText) {
  const prompt = `${styleText}\n\n${text}`;
  const body = {
    contents: [{ parts: [{ text: prompt }] }],
    generationConfig: {
      responseModalities: ["AUDIO"],
      temperature: parseFloat(temperature),
      speechConfig: {
        voiceConfig: {
          prebuiltVoiceConfig: { voiceName: VOICE }
        }
      }
    }
  };

  const response = await fetch(`${API_URL}?key=${apiKey}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!response.ok) {
    let errMsg = '';
    try { const errData = await response.json(); errMsg = JSON.stringify(errData); }
    catch(e) { errMsg = await response.text().catch(() => ''); }
    throw new Error(`API ${response.status}: ${errMsg.substring(0, 300)}`);
  }

  const data = await response.json();
  const audioData = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
  if (!audioData) throw new Error('응답에 오디오 데이터 없음');

  const pcmBytes = Uint8Array.from(atob(audioData), c => c.charCodeAt(0));
  return pcmToWav(pcmBytes.buffer);
}

// ─── 타이머 ───
function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    document.getElementById('statTime').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }, 1000);
}
function stopTimer() { if (timerInterval) clearInterval(timerInterval); }

// ─── 결과 항목 ───
function addResultItem(fileNum, chunk, blob) {
  const div = document.createElement('div');
  div.className = 'result-item';
  const url = URL.createObjectURL(blob);
  div.innerHTML = `
    <div class="info">
      <div class="title">${fileNum}.wav (${chunk.text.length}자) — ${chunk.scenes.length}씬</div>
      <div class="preview">${chunk.scenes.join(', ')}</div>
    </div>
    <audio controls src="${url}" style="height:35px;"></audio>
  `;
  document.getElementById('results').appendChild(div);
}

// ─── 메인 실행 ───
async function startTTS() {
  apiKeys = document.getElementById('apiKey').value.split(',').map(k => k.trim()).filter(k => k);
  if (apiKeys.length === 0) { alert('API 키를 입력하세요.'); return; }
  currentKeyIndex = 0;
  keyUsage = {};
  apiKeys.forEach((_, i) => keyUsage[i] = 0);
  updateKeyStatus();

  const styleText = getStyleText();
  if (!styleText) { alert('음성 스타일을 입력하세요.'); return; }

  if (chunks.length === 0) { alert('먼저 JSON을 파싱하세요.'); return; }

  const delay = parseInt(document.getElementById('requestDelay').value) || 25;
  const temperature = document.getElementById('temperature').value || '1.35';
  const autoSave = document.getElementById('autoDownload').checked;

  audioBlobs = {};
  chunkMapping = [];

  document.getElementById('log').innerHTML = '';
  document.getElementById('results').innerHTML = '';

  addLog(`스타일: ${styleText.substring(0, 50)}...`, 'info');
  addLog(`씬: ${sceneOrder.length}개 → ${chunks.length}개 청크`, 'ok');
  chunks.forEach((c, i) => addLog(`  청크 ${i+1}: ${c.text.length}자 (${c.scenes.join(', ')})`, 'info'));
  addLog(`API 키: ${apiKeys.length}개 | 간격: ${delay}초 | 모델: Pro Preview TTS`, 'info');

  isRunning = true;
  isStopped = false;
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStop').style.display = 'inline-block';
  document.getElementById('btnDownloadZip').disabled = true;
  document.getElementById('btnDownloadMapping').disabled = true;
  document.getElementById('statTotal').textContent = chunks.length;
  document.getElementById('statDone').textContent = 0;
  document.getElementById('statFail').textContent = 0;

  startTimer();

  let doneCount = 0;
  let failCount = 0;

  for (let i = 0; i < chunks.length; i++) {
    if (isStopped) { addLog('사용자가 중지했습니다.', 'warn'); break; }

    const fileNum = String(i + 1).padStart(3, '0');
    const chunk = chunks[i];

    addLog(`[${fileNum}/${String(chunks.length).padStart(3,'0')}] 생성 중... (${chunk.text.length}자, ${chunk.scenes.length}씬) [키${currentKeyIndex+1}]`, 'info');

    let success = false;
    let retry = 0;
    const MAX_RETRY = 3;

    while (retry < MAX_RETRY && !success && !isStopped) {
      try {
        const wavBlob = await callTTS(chunk.text, apiKeys[currentKeyIndex], temperature, styleText);

        audioBlobs[fileNum] = { audio: wavBlob, chunk: chunk };
        doneCount++;
        success = true;

        // 매핑 데이터 저장
        chunkMapping.push({
          file: `${fileNum}.wav`,
          chunkIndex: i,
          chars: chunk.text.length,
          scenes: chunk.scenes,
          texts: chunk.texts,
          firstWords: {}
        });
        // 각 씬의 첫 30자 저장 (Whisper 매칭용)
        for (const sceneId of chunk.scenes) {
          chunkMapping[chunkMapping.length - 1].firstWords[sceneId] = chunk.texts[sceneId].substring(0, 30);
        }

        if (typeof keyUsage[currentKeyIndex] === 'number') keyUsage[currentKeyIndex]++;
        updateKeyStatus();

        addLog(`✓ ${fileNum} 완료 (${(wavBlob.size/1024).toFixed(0)}KB)`, 'ok');
        addResultItem(fileNum, chunk, wavBlob);

        if (autoSave) {
          autoDownloadFile(wavBlob, `${fileNum}.wav`);
          addLog(`💾 ${fileNum}.wav 자동 저장됨`, 'ok');
        }

      } catch (err) {
        const errMsg = err.message;
        addLog(`✗ ${fileNum} 에러 (키${currentKeyIndex+1}): ${errMsg.substring(0, 150)}`, 'err');

        if (errMsg.includes('429')) {
          keyUsage[currentKeyIndex] = 'dead';
          updateKeyStatus();
          if (switchToNextKey('429 한도 도달')) {
            addLog(`⏳ 새 키 안정화 30초 대기...`, 'warn');
            await sleep(30000);
            continue;
          } else {
            addLog(`⏳ 모든 키 소진. 60초 대기 후 재시도...`, 'warn');
            await sleep(60000);
            currentKeyIndex = 0;
            apiKeys.forEach((_, idx) => { if(keyUsage[idx] === 'dead') keyUsage[idx] = 0; });
            updateKeyStatus();
            retry++;
            continue;
          }
        } else if (errMsg.includes('400')) {
          keyUsage[currentKeyIndex] = 'dead';
          updateKeyStatus();
          if (switchToNextKey('400 유효하지 않은 키')) {
            continue;
          } else {
            retry++;
          }
        } else {
          retry++;
          if (retry < MAX_RETRY) {
            const waitSec = retry * 15;
            addLog(`↻ ${waitSec}초 후 재시도... [재시도${retry}/${MAX_RETRY}]`, 'warn');
            await sleep(waitSec * 1000);
          }
        }
      }
    }

    if (!success) {
      failCount++;
      addLog(`✗ ${fileNum} 최종 실패`, 'err');
    }

    document.getElementById('statDone').textContent = doneCount;
    document.getElementById('statFail').textContent = failCount;
    const pct = Math.round(((doneCount + failCount) / chunks.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressFill').textContent = pct + '%';

    if (i < chunks.length - 1 && !isStopped && success) {
      addLog(`⏳ ${delay}초 대기...`, 'info');
      await sleep(delay * 1000);
    }
  }

  stopTimer();
  isRunning = false;
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').style.display = 'none';

  if (doneCount > 0) {
    document.getElementById('btnDownloadZip').disabled = false;
    document.getElementById('btnDownloadMapping').disabled = false;
    addLog(`\n✅ 완료! 성공: ${doneCount}, 실패: ${failCount}`, 'ok');
    if (autoSave) addLog(`💾 WAV ${doneCount}개가 다운로드 폴더에 저장됨`, 'ok');
  } else {
    addLog(`\n❌ 모든 청크 실패`, 'err');
  }
}

function stopTTS() {
  isStopped = true;
  addLog('중지 요청...', 'warn');
}

// ─── 매핑 JSON 다운로드 ───
function downloadMapping() {
  const mappingData = {
    version: '5.0',
    created: new Date().toISOString(),
    totalScenes: sceneOrder.length,
    totalChunks: chunkMapping.length,
    chunkSize: parseInt(document.getElementById('chunkSize').value) || 1500,
    chunks: chunkMapping
  };
  const blob = new Blob([JSON.stringify(mappingData, null, 2)], { type: 'application/json' });
  autoDownloadFile(blob, `scene_mapping_${new Date().toISOString().slice(0,10)}.json`);
  addLog('씬 매핑 JSON 다운로드 완료', 'ok');
}

// ─── ZIP 다운로드 ───
async function downloadZip() {
  const zip = new JSZip();

  for (const [fileNum, data] of Object.entries(audioBlobs)) {
    zip.file(`${fileNum}.wav`, data.audio);
  }

  // 매핑 JSON 포함
  const mappingData = {
    version: '5.0',
    created: new Date().toISOString(),
    totalScenes: sceneOrder.length,
    totalChunks: chunkMapping.length,
    chunkSize: parseInt(document.getElementById('chunkSize').value) || 1500,
    chunks: chunkMapping
  };
  zip.file('scene_mapping.json', JSON.stringify(mappingData, null, 2));

  // 원본 씬 JSON도 포함
  zip.file('scenes_original.json', JSON.stringify(scenes, null, 2));

  const content = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(content);
  a.download = `gd_tts_v5_${new Date().toISOString().slice(0,10)}.zip`;
  a.click();
  addLog('ZIP 다운로드 완료 (WAV + 씬 매핑 + 원본 씬)', 'ok');
}
</script>
