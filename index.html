<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GD TTS Studio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #e94560;
            margin: 20px 0;
            font-size: 1.8em;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: #16213e;
            border: none;
            color: #888;
            font-size: 0.95em;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            transition: all 0.3s;
            min-width: 100px;
        }

        .tab-btn.active {
            background: #0f3460;
            color: #e94560;
            font-weight: bold;
        }

        .tab-content {
            display: none;
            background: #0f3460;
            border-radius: 0 0 8px 8px;
            padding: 25px;
        }

        .tab-content.active {
            display: block;
        }

        label {
            display: block;
            margin: 15px 0 5px;
            color: #aaa;
            font-size: 0.9em;
        }

        input[type="text"],
        input[type="password"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            background: #16213e;
            border: 1px solid #333;
            color: #e0e0e0;
            border-radius: 6px;
            font-size: 0.95em;
        }

        textarea {
            width: 100%;
            padding: 12px;
            background: #16213e;
            border: 1px solid #333;
            color: #e0e0e0;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85em;
            line-height: 1.6;
            resize: vertical;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #e94560;
            color: white;
        }

        .btn-primary:hover {
            background: #c73651;
        }

        .btn-primary:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #16213e;
            color: #e94560;
            border: 1px solid #e94560;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.85em;
        }

        .api-key-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #16213e;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .api-key-bar input {
            flex: 1;
            margin: 0;
        }

        .api-key-bar .status {
            font-size: 0.85em;
            white-space: nowrap;
        }

        .char-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }

        .char-table th,
        .char-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #1a1a2e;
        }

        .char-table th {
            color: #e94560;
            font-size: 0.85em;
        }

        .char-table select {
            width: auto;
            min-width: 140px;
        }

        .char-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75em;
        }

        .badge-auto {
            background: #0a3d62;
            color: #82ccdd;
        }

        .badge-manual {
            background: #6a0572;
            color: #e0aaff;
        }

        .progress-bar {
            width: 100%;
            height: 24px;
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #c73651);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            font-weight: bold;
        }

        .log-area {
            background: #0a0a1a;
            border-radius: 6px;
            padding: 12px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.82em;
            line-height: 1.8;
        }

        .log-ok {
            color: #27ae60;
        }

        .log-fail {
            color: #e94560;
        }

        .log-info {
            color: #82ccdd;
        }

        .result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: #16213e;
            border-radius: 6px;
            margin: 8px 0;
        }

        .result-item .num {
            color: #e94560;
            font-weight: bold;
            min-width: 40px;
        }

        .result-item .info {
            flex: 1;
            font-size: 0.85em;
        }

        .result-item .speaker-tag {
            color: #82ccdd;
            font-weight: bold;
        }

        .result-item audio {
            height: 32px;
        }

        .result-item .duration {
            color: #888;
            font-size: 0.8em;
            min-width: 50px;
        }

        .settings-row {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .settings-row>div {
            flex: 1;
            min-width: 150px;
        }

        .stats {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .stat-box {
            flex: 1;
            min-width: 120px;
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-box .num {
            font-size: 1.5em;
            color: #e94560;
            font-weight: bold;
        }

        .stat-box .label {
            font-size: 0.8em;
            color: #888;
            margin-top: 5px;
        }

        .vrew-preview {
            background: #16213e;
            border-radius: 6px;
            padding: 12px;
            margin: 10px 0;
            max-height: 400px;
            overflow-y: auto;
        }

        .vrew-clip {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px solid #0f3460;
        }

        .vrew-clip .clip-num {
            color: #e94560;
            font-weight: bold;
            min-width: 35px;
        }

        .vrew-clip .clip-type {
            font-size: 0.75em;
            padding: 2px 8px;
            border-radius: 10px;
            min-width: 60px;
            text-align: center;
        }

        .type-narration {
            background: #0a3d62;
            color: #82ccdd;
        }

        .type-dialogue {
            background: #6a0572;
            color: #e0aaff;
        }

        .type-scene {
            background: #e94560;
            color: white;
        }

        .vrew-clip .clip-text {
            flex: 1;
            font-size: 0.85em;
            color: #ccc;
        }

        .vrew-clip .clip-dur {
            color: #888;
            font-size: 0.8em;
            min-width: 50px;
            text-align: right;
        }

        .vrew-settings {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 15px 0;
        }

        .vrew-settings>div {
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
        }

        .vrew-settings h4 {
            color: #e94560;
            margin-bottom: 10px;
            font-size: 0.9em;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>GD TTS Studio</h1>
        <p class="subtitle">대본 → TTS → VREW 자동 생성 파이프라인 v3.0 | MP3 + 자막 + .vrew 출력</p>
        <div class="api-key-bar">
            <span style="color:#e94560; font-weight:bold;">API Key:</span>
            <input type="password" id="apiKey" placeholder="Gemini API 키 입력...">
            <span class="status" id="apiStatus">⚪ 미입력</span>
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('script')">1. 대본</button>
            <button class="tab-btn" onclick="switchTab('characters')">2. 캐릭터</button>
            <button class="tab-btn" onclick="switchTab('generate')">3. TTS 생성</button>
            <button class="tab-btn" onclick="switchTab('results')">4. 결과</button>
            <button class="tab-btn" onclick="switchTab('vrew')">5. VREW</button>
        </div>
        <div id="tab-script" class="tab-content active">
            <label>대본 붙여넣기 (또는 파일 업로드)</label>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <input type="file" id="fileInput" accept=".txt" style="flex:1;" onchange="loadFile(event)">
                <button class="btn-secondary btn-small" onclick="loadSample()">샘플 대본</button>
            </div>
            <textarea id="scriptInput" rows="20" placeholder="========== 등장인물 ==========
[캐릭터/나레이션/성별:남/나이:40대/톤:차분하고 깊은 목소리]
========== 본문 ==========
[나레이션/담담하게] 깊은 가을이었습니다."></textarea>
            <div style="margin-top:15px; display:flex; gap:10px;">
                <button class="btn-primary" onclick="parseScript()">대본 분석하기</button>
                <span id="parseStatus" style="line-height:42px; color:#888;"></span>
            </div>
        </div>
        <div id="tab-characters" class="tab-content">
            <h3 style="color:#e94560; margin-bottom:15px;">등장인물 & 음성 매칭</h3>
            <div id="charTableWrap">
                <p style="color:#888;">먼저 대본을 분석해 주세요.</p>
            </div>
            <div style="margin-top:20px;">
                <h4 style="color:#aaa; margin-bottom:10px;">나레이션 묶기 설정</h4>
                <div class="settings-row">
                    <div><label>연속 나레이션 최대 묶기 수</label>
                        <select id="mergeCount">
                            <option value="3">3문장</option>
                            <option value="5" selected>5문장 (권장)</option>
                            <option value="7">7문장</option>
                            <option value="10">10문장</option>
                        </select>
                    </div>
                    <div><label>API 호출 간격 (초)</label>
                        <input type="number" id="apiDelay" value="2" min="1" max="10">
                    </div>
                </div>
            </div>
        </div>
        <div id="tab-generate" class="tab-content">
            <div class="stats">
                <div class="stat-box">
                    <div class="num" id="statTotal">-</div>
                    <div class="label">총 TTS</div>
                </div>
                <div class="stat-box">
                    <div class="num" id="statDone">0</div>
                    <div class="label">완료</div>
                </div>
                <div class="stat-box">
                    <div class="num" id="statFail">0</div>
                    <div class="label">실패</div>
                </div>
                <div class="stat-box">
                    <div class="num" id="statTime">-</div>
                    <div class="label">예상(분)</div>
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width:0%;">0%</div>
            </div>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button class="btn-primary" id="btnGenerate" onclick="startGeneration()">TTS 생성 시작</button>
                <button class="btn-secondary" id="btnStop" onclick="stopGeneration()" disabled>중지</button>
            </div>
            <div class="log-area" id="logArea"></div>
        </div>
        <div id="tab-results" class="tab-content">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button class="btn-primary" onclick="downloadAllZip()">전체 ZIP 다운로드</button>
                <button class="btn-secondary" onclick="downloadMapping()">mapping.json</button>
            </div>
            <div id="resultsList">
                <p style="color:#888;">TTS 생성 후 결과가 표시됩니다.</p>
            </div>
        </div>
        <div id="tab-vrew" class="tab-content">
            <h3 style="color:#e94560; margin-bottom:15px;">VREW 프로젝트 생성</h3>
            <div class="vrew-settings">
                <div>
                    <h4>비디오 설정</h4>
                    <label>해상도</label>
                    <select id="vrewResolution">
                        <option value="1920x1080" selected>1920x1080 (16:9)</option>
                        <option value="1080x1920">1080x1920 (9:16)</option>
                        <option value="1080x1080">1080x1080 (1:1)</option>
                    </select>
                    <label>TTS 볼륨</label>
                    <select id="vrewVolume">
                        <option value="0.8">0.8 (약간 작게)</option>
                        <option value="1.0" selected>1.0 (기본)</option>
                        <option value="1.2">1.2 (약간 크게)</option>
                        <option value="1.5">1.5 (크게)</option>
                    </select>
                </div>
                <div>
                    <h4>자막 설정</h4>
                    <label>폰트</label>
                    <select id="vrewFont">
                        <option value="NanumSquare Neo ExtraBold-Vrew_800" selected>나눔스퀘어 네오 ExtraBold</option>
                        <option value="Pretendard-Vrew_700">Pretendard Bold</option>
                        <option value="NanumGothic-Vrew_700">나눔고딕 Bold</option>
                    </select>
                    <label>글자 크기</label>
                    <input type="number" id="vrewFontSize" value="170" min="50" max="300">
                    <label>글자 색상</label>
                    <input type="text" id="vrewFontColor" value="#ffffff">
                </div>
            </div>
            <h4 style="color:#aaa; margin:20px 0 10px;">클립 미리보기</h4>
            <div class="vrew-preview" id="vrewPreview">
                <p style="color:#888;">TTS 생성 후 미리보기가 표시됩니다.</p>
            </div>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button class="btn-primary" onclick="generateVrew()" id="btnVrew">.vrew 파일 생성 & 다운로드</button>
            </div>
            <div class="log-area" id="vrewLog" style="margin-top:15px;"></div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
    <script>
        let parsedCharacters = {}, parsedLines = [], mergedLines = [], generatedClips = [], audioBlobs = {}, stopRequested = false;
        const ALL_VOICES = [{ name: "Zephyr", desc: "Bright" }, { name: "Charon", desc: "Informative" }, { name: "Kore", desc: "Firm" }, { name: "Fenrir", desc: "Excitable" }, { name: "Leda", desc: "Youthful" }, { name: "Orus", desc: "Firm" }, { name: "Aoede", desc: "Breezy" }, { name: "Callirrhoe", desc: "Casual" }, { name: "Autonoe", desc: "Bright" }, { name: "Iapetus", desc: "Clear" }, { name: "Umbriel", desc: "Casual" }, { name: "Algieba", desc: "Smooth" }, { name: "Despina", desc: "Smooth" }, { name: "Erinome", desc: "Clear" }, { name: "Algenib", desc: "Gravelly" }, { name: "Rasalgethi", desc: "Informative" }, { name: "Laomedeia", desc: "Upbeat" }, { name: "Achernar", desc: "Soft" }, { name: "Alnilam", desc: "Firm" }, { name: "Schedar", desc: "Even" }, { name: "Gacrux", desc: "Mature" }, { name: "Pulcherrima", desc: "Forward" }, { name: "Achird", desc: "Friendly" }, { name: "Zubenelgenubi", desc: "Casual" }, { name: "Vindemiatrix", desc: "Gentle" }, { name: "Sadachbia", desc: "Lively" }, { name: "Sadaltager", desc: "Knowledgeable" }, { name: "Sulafat", desc: "Warm" }];
        const VOICE_AUTO_MAP = { "남_아이": "Leda", "남_10대": "Leda", "남_20대": "Orus", "남_30대": "Orus", "남_청년": "Orus", "남_40대": "Charon", "남_50대": "Charon", "남_중년": "Charon", "남_60대": "Fenrir", "남_70대": "Fenrir", "남_노년": "Fenrir", "여_아이": "Leda", "여_10대": "Zephyr", "여_20대": "Zephyr", "여_청년": "Zephyr", "여_30대": "Aoede", "여_40대": "Aoede", "여_중년": "Aoede", "여_50대": "Gacrux", "여_60대": "Gacrux", "여_70대": "Gacrux", "여_노년": "Gacrux" };

        function uid() { return Math.random().toString(36).substr(2, 10); }
        function uuid() { return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { const r = Math.random() * 16 | 0; return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16); }); }

        function switchTab(name) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-' + name).classList.add('active');
            const tabs = ['script', 'characters', 'generate', 'results', 'vrew'];
            document.querySelectorAll('.tab-btn')[tabs.indexOf(name)].classList.add('active');
            if (name === 'vrew') renderVrewPreview();
        }
        function autoMatchVoice(g, a) { let k = g + '_' + a; if (VOICE_AUTO_MAP[k]) return VOICE_AUTO_MAP[k]; const n = a.match(/\d+/); if (n) { const age = parseInt(n[0]); let c; if (age <= 12) c = '아이'; else if (age <= 19) c = '10대'; else if (age <= 29) c = '20대'; else if (age <= 39) c = '30대'; else if (age <= 49) c = '40대'; else if (age <= 59) c = '50대'; else if (age <= 69) c = '60대'; else c = '70대'; k = g + '_' + c; if (VOICE_AUTO_MAP[k]) return VOICE_AUTO_MAP[k]; } return g === '남' ? 'Charon' : 'Aoede'; }

        function parseScript() {
            const text = document.getElementById('scriptInput').value;
            if (!text.trim()) { alert('대본을 입력해 주세요.'); return; }
            const parts = text.split(/={3,}\s*본문\s*={3,}/);
            const cs = parts.length >= 2 ? parts[0] : '', bs = parts.length >= 2 ? parts[1] : text;
            parsedCharacters = {};
            let m; const r1 = /\[캐릭터\/([^/]+)\/성별:([^/]+)\/나이:([^/]+)\/톤:([^/]+)\/음성:([^\]]+)\]/g;
            while ((m = r1.exec(cs)) !== null) parsedCharacters[m[1].trim()] = { gender: m[2].trim(), age: m[3].trim(), tone: m[4].trim(), voice: m[5].trim(), voiceSource: '직접지정' };
            const r2 = /\[캐릭터\/([^/]+)\/성별:([^/]+)\/나이:([^/]+)\/톤:([^\]]+)\]/g;
            while ((m = r2.exec(cs)) !== null) { const n = m[1].trim(); if (parsedCharacters[n]) continue; const g = m[2].trim(), a = m[3].trim(); parsedCharacters[n] = { gender: g, age: a, tone: m[4].trim(), voice: autoMatchVoice(g, a), voiceSource: '자동매칭' }; }
            if (!parsedCharacters['나레이션']) parsedCharacters['나레이션'] = { gender: '남', age: '40대', tone: '차분하고 깊은 목소리', voice: autoMatchVoice('남', '40대'), voiceSource: '기본값' };
            parsedLines = [];
            bs.trim().split('\n').forEach(raw => {
                raw = raw.trim(); if (!raw || raw.startsWith('#') || raw.startsWith('=')) return;
                let sm = /\[장면전환\/이미지:\s*(.+)\]/.exec(raw);
                if (sm) { parsedLines.push({ type: 'scene_change', description: sm[1].trim() }); return; }
                let lm = /\[([^/\]]+)\/([^\]]+)\]\s*(.+)/.exec(raw);
                if (lm) {
                    const sp = lm[1].trim(), em = lm[2].trim(), tx = lm[3].trim().replace(/^[""\u201c]+|[""\u201d]+$/g, '');
                    parsedLines.push({ type: sp === '나레이션' ? 'narration' : 'dialogue', speaker: sp, emotion: em, text: tx });
                }
            });
            document.getElementById('parseStatus').textContent = `✅ ${Object.keys(parsedCharacters).length}명, ${parsedLines.length}줄`;
            renderCharTable(); switchTab('characters');
        }
        function renderCharTable() {
            let h = '<table class="char-table"><tr><th>캐릭터</th><th>성별</th><th>나이</th><th>톤</th><th>음성</th><th>매칭</th></tr>';
            for (const [n, i] of Object.entries(parsedCharacters)) {
                h += `<tr><td><strong>${n}</strong></td><td>${i.gender}</td><td>${i.age}</td><td style="font-size:0.85em;color:#aaa;">${i.tone}</td><td><select onchange="updateVoice('${n}',this.value)">`;
                ALL_VOICES.forEach(v => { h += `<option value="${v.name}"${v.name === i.voice ? ' selected' : ''}>${v.name} - ${v.desc}</option>`; });
                h += `</select></td><td><span class="char-badge ${i.voiceSource === '직접지정' ? 'badge-manual' : 'badge-auto'}">${i.voiceSource}</span></td></tr>`;
            }
            document.getElementById('charTableWrap').innerHTML = h + '</table>';
        }
        function updateVoice(n, v) { parsedCharacters[n].voice = v; parsedCharacters[n].voiceSource = '직접지정'; renderCharTable(); }

        function mergeNarrations(lines, max) {
            const mg = []; let buf = null;

        async function callTTS(apiKey, prompt, voiceName) {

        async function startGeneration() {
