<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GD TTS Studio v7.4 (Gemini 2.5 Pro TTS Edition)</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Malgun Gothic', sans-serif; padding: 20px; }
        h1 { color: #00bcd4; text-align: center; }
        .subtitle { text-align: center; color: #aaa; margin-bottom: 20px; }
        .container { display: flex; flex-direction: column; gap: 15px; max-width: 900px; margin: 0 auto; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 10px; border-left: 5px solid #00bcd4; }
        .key-input { width: 100%; padding: 12px; background: #2d2d2d; color: #00bcd4; border: 1px solid #333; font-family: monospace; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        .option-group { margin-bottom: 15px; padding: 10px; background: #252525; border-radius: 8px; border: 1px dashed #444; }
        .option-label { font-weight: bold; color: #ffab00; margin-right: 10px; font-size: 16px; }
        select { padding: 8px; background: #333; color: #fff; border: 1px solid #555; font-size: 15px; border-radius: 5px; outline: none; width: 60%; }
        .fixed-options { font-size: 13px; color: #888; margin-top: 5px; }
        textarea { width: 100%; height: 350px; background: #2d2d2d; color: #fff; border: 1px solid #444; padding: 15px; box-sizing: border-box; font-size: 14px; line-height: 1.8; resize: vertical; margin-top: 5px; }
        button { background: #00bcd4; color: #000; border: none; padding: 18px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #00838f; color: white; }
        .log-box { height: 180px; overflow-y: auto; background: #000; padding: 15px; font-family: monospace; border-radius: 8px; border: 1px solid #333; }
        .log-item { margin-bottom: 5px; font-size: 14px; }
        .success { color: #4CAF50; } .error { color: #f44336; } .warn { color: #ffeb3b; } .info { color: #00bcd4; }
        .filtered-text { color: #888; text-decoration: line-through; }
    </style>
</head>
<body>

    <h1>🚀 GD TTS Studio v7.4 (2.5 Pro TTS 전용 모드)</h1>
    <p class="subtitle">AI Studio와 동일한 세팅! (Voice: Zephyr, Temperature: 1.35 고정)</p>
    
    <div class="container">
        <div class="box">
            <h3>🔑 1. 구글 API 키</h3>
            <input type="text" id="singleApiKey" class="key-input" placeholder="AIzaSy...">
        </div>

        <div class="box">
            <h3>📝 2. 성우 옵션 및 대본 투척</h3>
            <div class="option-group">
                <span class="option-label">🎙️ 낭독 스타일(프롬프트 지시):</span>
                <select id="voiceTone">
                    <option value="구연동화를 읽는 것처럼, 온화한 목소리로 아주 천천히 또박또박 정겹게 읽어줘.">야담톤 (온화하고 정겨운 구연동화 스타일)</option>
                    <option value="라디오에서 사연을 읽어주는 스타일로, 대사는 맛깔나게 읽어줘.">라디오사연톤 (맛깔나는 라디오 DJ 스타일)</option>
                    <option value="시니어들이 잘 알아들을 수 있게 정겨운 목소리로 또박또박 읽어줘.">시니어사연톤 (또박또박하고 정겨운 시니어 맞춤형)</option>
                </select>
                <div class="fixed-options">※ 고정 설정 (API 파라미터 적용): Model: gemini-2.5-pro-preview-tts | Voice: Zephyr | Temp: 1.35</div>
            </div>
            <textarea id="scriptInput" placeholder="여기에 대본을 통째로 붙여넣으세요. [인트로] 같은 제목은 알아서 뺍니다!"></textarea>
            <button id="startBtn" onclick="startGeneration()">🔥 2.5 Pro 모델로 완벽한 MP3 뽑아내기!</button>
        </div>

        <div class="box">
            <h3>📊 진행 로그</h3>
            <div id="logBox" class="log-box"></div>
        </div>
    </div>

    <script>
        let isRunning = false;

        function addLog(msg, type="info") {
            const logBox = document.getElementById('logBox');
            logBox.innerHTML += `<div class="log-item ${type}">${msg}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        async function startGeneration() {
            if (isRunning) return;
            const apiKey = document.getElementById('singleApiKey').value.trim();
            if (!apiKey) return alert("API 키를 넣어주세요!");
            
            const rawText = document.getElementById('scriptInput').value;
            if (!rawText.trim()) return alert("대본을 입력하세요!");

            const selectedTone = document.getElementById('voiceTone').value;
            const selectedToneName = document.getElementById('voiceTone').options[document.getElementById('voiceTone').selectedIndex].text;

            document.getElementById('logBox').innerHTML = ''; 
            addLog(`🚀 [${selectedToneName}] 스타일로 2.5 Pro TTS 모델을 호출합니다.`, 'warn');
            
            isRunning = true;
            document.getElementById('startBtn').innerText = "⏳ 2.5 Pro 엔진 가동 중... (기다려주세요)";
            document.getElementById('startBtn').style.background = "#555";

            // 대본 정리 (제목 빼기 & 2초 무음 넣기)
            const lines = rawText.split('\n').map(l => l.trim()).filter(l => l !== '');
            let cleanScript = "";
            let removedCount = 0;

            for (const line of lines) {
                if (line.match(/^\[.*\]$/) || line.match(/^【.*】$/)) {
                    addLog(`🗑️ 제외됨: <span class="filtered-text">${line}</span>`, 'info');
                    removedCount++;
                    continue; 
                }
                cleanScript += line + "\n[2초간 완전한 침묵]\n"; 
            }
            addLog(`✅ 총 ${removedCount}개의 제목을 제거했습니다.`, 'success');

            const masterPrompt = `스타일 지시: ${selectedTone}\n\n아래 대본을 읽어주세요. 각 문장 끝에 적힌 '[2초간 완전한 침묵]' 지시를 반드시 지켜서 2초 동안 소리를 내지 말고 쉬어야 합니다.\n\n대본:\n"${cleanScript}"`;

            try {
                addLog(`📡 구글 2.5 Pro 전용 모델에 요청을 전송합니다! (Voice: Zephyr, Temp: 1.35)`, 'warn');
                
                // ★ 핵심: 모델 주소를 2.5 Pro TTS 전용으로 변경! ★
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro-preview-tts:generateContent?key=${apiKey}`;
                
                const requestBody = {
                    contents: [{ parts: [{ text: masterPrompt }] }],
                    generationConfig: { 
                        temperature: 1.35, // 캡처 화면에서 설정하신 값
                        // ★ 2.5 Pro TTS 모델 전용 오디오 옵션 세팅! ★
                        speechConfig: {
                            voiceConfig: {
                                prebuiltVoiceConfig: {
                                    voiceName: "Zephyr" // 캡처 화면에서 고르신 목소리
                                }
                            }
                        }
                    }
                };

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                if (response.status === 400) {
                    const errorData = await response.text();
                    throw new Error(`400 에러: ${errorData.substring(0, 100)}`);
                }
                if (response.status === 429) {
                    throw new Error("429 에러! 계정 한도가 초과되었습니다. 다른 키로 교체해주세요.");
                }
                if (!response.ok) throw new Error(`API Error ${response.status}`);

                const data = await response.json();
                
                // 2.5 Pro TTS 모델의 응답 구조 파싱 (일반 모델과 다를 수 있음)
                let base64Audio = null;
                
                // 응답에서 inlineData(오디오) 찾기
                const parts = data.candidates?.[0]?.content?.parts;
                if (parts) {
                    for (let part of parts) {
                        if (part.inlineData && part.inlineData.mimeType.includes("audio")) {
                            base64Audio = part.inlineData.data;
                            break;
                        }
                    }
                }

                if (base64Audio) {
                    const byteCharacters = atob(base64Audio);
                    const byteNumbers = new Array(byteCharacters.length);
                    for (let i = 0; i < byteCharacters.length; i++) byteNumbers[i] = byteCharacters.charCodeAt(i);
                    const mp3Blob = new Blob([new Uint8Array(byteNumbers)], { type: 'audio/mp3' }); // 기본 출력은 보통 wav나 mp3 형태

                    addLog(`🎉 드디어 성공했습니다! Zephyr 목소리의 오디오를 다운로드합니다!`, 'success');
                    
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(mp3Blob);
                    link.download = `GD_Story_Zephyr.mp3`; // MP3로 저장 유도
                    link.click();
                    
                    addLog(`💡 다음 단계: 다운받은 MP3를 VREW에 넣고 [무음 구간 줄이기]를 실행하세요!`, 'info');

                } else {
                    throw new Error('구글이 오디오 데이터를 주지 않았습니다. (텍스트만 옴)');
                }

            } catch (e) {
                addLog(`❌ [실패] ${e.message}`, 'error');
            } finally {
                isRunning = false;
                document.getElementById('startBtn').innerText = "🔥 2.5 Pro 모델로 완벽한 MP3 뽑아내기!";
                document.getElementById('startBtn').style.background = "#00bcd4";
            }
        }
    </script>
</body>
</html>
