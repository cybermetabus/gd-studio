<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GD TTS Studio v5.0 (Azure Edition)</title>
    <!-- VREW용 ZIP 묶기 라이브러리 (MP3 변환용 lamejs는 이제 필요 없습니다! 야호!) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { background-color: #1e1e1e; color: #f0f0f0; font-family: 'Malgun Gothic', sans-serif; padding: 20px; }
        h1 { color: #0078d4; }
        .container { display: flex; gap: 20px; }
        .box { flex: 1; background: #2d2d2d; padding: 20px; border-radius: 8px; }
        textarea { width: 100%; height: 300px; background: #1e1e1e; color: #fff; border: 1px solid #444; padding: 10px; box-sizing: border-box; }
        button { background: #0078d4; color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; }
        button:hover { background: #005a9e; }
        .log-box { height: 300px; overflow-y: auto; background: #000; padding: 10px; font-family: monospace; border-radius: 4px; border: 1px solid #444; }
        .log-item { margin-bottom: 5px; }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        .info { color: #2196F3; }
    </style>
</head>
<body>

    <h1>🚀 GD TTS Studio v5.0 (Azure 쾌속 질주 모드)</h1>
    <p>1초에 20번 쏘는 괴물 속도! 429 에러여 영원히 안녕~!</p>

    <div class="container">
        <!-- 1. 대본 입력 영역 -->
        <div class="box">
            <h3>📝 대본 입력 (캐릭터: 대사 형식)</h3>
            <textarea id="scriptInput" placeholder="할머니: 아이고 허리야, 비가 오려나보다.&#10;할아버지: 쯧쯧, 약을 챙겨 먹어야지.&#10;내레이션: 그렇게 두 노부부의 아침이 밝았습니다."></textarea>
            <button onclick="startAzureGeneration()">⚡ 애저 TTS 생성 및 VREW ZIP 다운로드</button>
        </div>

        <!-- 2. 진행 상황 및 로그 영역 -->
        <div class="box">
            <h3>📊 실시간 진행 상황</h3>
            <div id="logBox" class="log-box"></div>
        </div>
    </div>

    <script>
        // GD님이 직접 따오신 애저 무료 API 키 세팅!!
        const AZURE_API_KEY = "FM6xOkd4Ri2eWKmUqABDGbqAZK3T1CP5eyIIUIN5CjzbhKZ6Vp8jJQQJ99CCACYeBjFXJ3w3AAAYACOGBd2v";
        const AZURE_REGION = "eastus";

        // 한국어/일본어 목소리 자동 매핑 세팅
        const VOICE_MAP = {
            "할머니": "ko-KR-SunHiNeural",   // 따뜻한 한국어 여성
            "할아버지": "ko-KR-InJoonNeural", // 중후한 한국어 남성
            "내레이션": "ko-KR-SeoHyeonNeural", // 차분한 내레이션 톤
            "일본인": "ja-JP-NanamiNeural",   // 일본어 여성 
            "기본": "ko-KR-SunHiNeural"       // 캐릭터 안 적혀있으면 기본값
        };

        // 로그 찍어주는 함수
        function addLog(msg, type="info") {
            const logBox = document.getElementById('logBox');
            logBox.innerHTML += `<div class="log-item ${type}">${msg}</div>`;
            logBox.scrollTop = logBox.scrollHeight; // 스크롤 맨 아래로 유지
        }

        // 잠깐 쉬는 함수 (애저는 너무 빠르니까 0.1초만 쉬어도 됨!)
        const sleep = (ms) => new Promise(r => setTimeout(r, ms));

        // ★ 핵심: 애저 API한테 대본 던져주고 MP3 받아오는 찐 함수! ★
        async function fetchAzureTTS(text, voiceName) {
            const endpoint = `https://${AZURE_REGION}.tts.speech.microsoft.com/cognitiveservices/v1`;
            
            // 애저는 SSML이라는 태그 방식으로 감정을 전달합니다.
            const ssml = `
                <speak version='1.0' xml:lang='ko-KR'>
                    <voice name='${voiceName}'>
                        ${text}
                    </voice>
                </speak>
            `.trim();

            const response = await fetch(endpoint, {
                method: 'POST',
                headers: {
                    'Ocp-Apim-Subscription-Key': AZURE_API_KEY,
                    'Content-Type': 'application/ssml+xml',
                    'X-Microsoft-OutputFormat': 'audio-24khz-48kbitrate-mono-mp3', // MP3로 바로 뽑아랏!
                    'User-Agent': 'GDTTS_Studio'
                },
                body: ssml
            });

            if (!response.ok) {
                throw new Error(`애저 형님이 화내심 ㅠㅠ 에러코드: ${response.status}`);
            }

            return await response.blob(); // 고음질 MP3 파일 덩어리 리턴!
        }

        // 전체 작업 시작 버튼 눌렀을 때!
        async function startAzureGeneration() {
            const rawText = document.getElementById('scriptInput').value.trim();
            if (!rawText) return alert("대본을 입력해주세요!");

            const lines = rawText.split('\n').filter(line => line.trim() !== '');
            const zip = new JSZip(); // VREW용 압축파일 준비
            
            addLog(`🚀 총 ${lines.length}줄 작업 시작합니다! 꽉 잡으세요!`, 'info');

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                let character = "기본";
                let speech = line;

                // "할머니: 밥 먹었니?" 형식 파싱
                if (line.includes(':')) {
                    const parts = line.split(':');
                    character = parts[0].trim();
                    speech = parts.slice(1).join(':').trim();
                }

                // 목소리 매칭 (맵에 없으면 기본 목소리로)
                const voiceId = VOICE_MAP[character] || VOICE_MAP["기본"];

                try {
                    // 애저 API에 쏘기!
                    const mp3Blob = await fetchAzureTTS(speech, voiceId);
                    
                    // VREW가 순서대로 읽을 수 있게 파일명에 번호 붙이기 (예: 001.mp3)
                    const fileName = `${String(i + 1).padStart(3, '0')}.mp3`;
                    zip.file(fileName, mp3Blob);
                    
                    addLog(`[성공] ${fileName} 완료! (캐릭터: ${character})`, 'success');

                    // 구글에선 8.5초 쉬었죠? 애저는 0.1초만 쉬어도 끄떡없습니다! ㅋㅋㅋ
                    await sleep(100); 

                } catch (error) {
                    addLog(`[실패] ${i+1}번째 줄 에러: ${error.message}`, 'error');
                }
            }

            addLog(`🎉 모든 음성 생성 완료! ZIP 파일로 묶어서 다운로드합니다!`, 'info');
            
            // 압축해서 파일 다운로드 창 띄우기
            const content = await zip.generateAsync({type:"blob"});
            const link = document.createElement("a");
            link.href = URL.createObjectURL(content);
            link.download = "GD_Azure_Vrew_Audio.zip";
            link.click();
        }
    </script>
</body>
</html>
