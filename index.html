<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GD TTS Studio v7.2 (Masterpiece Edition)</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Malgun Gothic', sans-serif; padding: 20px; }
        h1 { color: #00e676; text-align: center; }
        .subtitle { text-align: center; color: #aaa; margin-bottom: 20px; }
        .container { display: flex; flex-direction: column; gap: 15px; max-width: 900px; margin: 0 auto; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 10px; border-left: 5px solid #00e676; }
        .key-input { width: 100%; padding: 12px; background: #2d2d2d; color: #00e676; border: 1px solid #333; font-family: monospace; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        
        /* 옵션 선택 디자인 */
        .option-group { margin-bottom: 15px; padding: 10px; background: #252525; border-radius: 8px; border: 1px dashed #444; }
        .option-label { font-weight: bold; color: #ffab00; margin-right: 10px; font-size: 16px; }
        select { padding: 8px; background: #333; color: #fff; border: 1px solid #555; font-size: 15px; border-radius: 5px; outline: none; cursor: pointer; width: 60%; }
        select:focus { border-color: #00e676; }
        .fixed-options { font-size: 13px; color: #888; margin-top: 5px; }

        textarea { width: 100%; height: 350px; background: #2d2d2d; color: #fff; border: 1px solid #444; padding: 15px; box-sizing: border-box; font-size: 14px; line-height: 1.8; resize: vertical; margin-top: 5px; }
        button { background: #00e676; color: #000; border: none; padding: 18px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #00c853; color: white; }
        
        .log-box { height: 180px; overflow-y: auto; background: #000; padding: 15px; font-family: monospace; border-radius: 8px; border: 1px solid #333; }
        .log-item { margin-bottom: 5px; font-size: 14px; }
        .success { color: #4CAF50; } .error { color: #f44336; } .warn { color: #ffeb3b; } .info { color: #00e676; }
        .filtered-text { color: #888; text-decoration: line-through; }
    </style>
</head>
<body>

    <h1>🎙️ GD TTS Studio v7.2 (감성 낭독 마스터)</h1>
    <p class="subtitle">제목 제거 + 2초 호흡 + 맞춤형 톤! 완벽한 라디오 사연을 만듭니다.</p>
    
    <div class="container">
        <!-- 1. API 키 -->
        <div class="box">
            <h3>🔑 1. 구글 API 키</h3>
            <input type="text" id="singleApiKey" class="key-input" placeholder="AIzaSy... (이번에 쓸 1개의 키)">
        </div>

        <!-- 2. 옵션 및 대본 -->
        <div class="box">
            <h3>📝 2. 성우 옵션 및 대본 투척</h3>
            
            <div class="option-group">
                <span class="option-label">🎙️ 성우 톤 선택:</span>
                <select id="voiceTone">
                    <option value="구연동화를 읽는 것처럼, 온화한 목소리로 아주 천천히 또박또박 정겹게 읽어줘.">야담톤 (온화하고 정겨운 구연동화 스타일)</option>
                    <option value="라디오에서 사연을 읽어주는 스타일로, 대사는 맛깔나게 읽어줘.">라디오사연톤 (맛깔나는 라디오 DJ 스타일)</option>
                    <option value="시니어들이 잘 알아들을 수 있게 정겨운 목소리로 또박또박 읽어줘.">시니어사연톤 (또박또박하고 정겨운 시니어 맞춤형)</option>
                </select>
                <div class="fixed-options">※ 고정 설정 적용됨: Single-speaker | Temperature: 1.35 | Voice: Zephyr</div>
            </div>

            <textarea id="scriptInput" placeholder="여기에 대본을 통째로 붙여넣으세요. [인트로]나 【챕터1...】 같은 괄호 제목들은 로봇이 알아서 빼고 읽습니다!"></textarea>
            <button id="startBtn" onclick="startGeneration()">🔥 대본 정리 & 2초 무음 컷팅으로 MP3 뽑아내기!</button>
        </div>

        <!-- 3. 로그 -->
        <div class="box">
            <h3>📊 로그 및 진행 상황</h3>
            <div id="logBox" class="log-box"></div>
        </div>
    </div>

    <script>
        let isRunning = false;

        function addLog(msg, type="info") {
            const logBox = document.getElementById('logBox');
            logBox.innerHTML += `<div class="log-item ${type}">${msg}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        async function startGeneration() {
            if (isRunning) return;
            const apiKey = document.getElementById('singleApiKey').value.trim();
            if (!apiKey) return alert("API 키를 넣어주세요!");
            
            const rawText = document.getElementById('scriptInput').value;
            if (!rawText.trim()) return alert("대본을 입력하세요!");

            const selectedTone = document.getElementById('voiceTone').value;
            const selectedToneName = document.getElementById('voiceTone').options[document.getElementById('voiceTone').selectedIndex].text;

            document.getElementById('logBox').innerHTML = ''; 
            addLog(`🚀 [${selectedToneName}] 설정으로 작업을 시작합니다.`, 'warn');
            
            isRunning = true;
            document.getElementById('startBtn').innerText = "⏳ 구글이 낭독 중입니다... (절대 끄지 마세요!)";
            document.getElementById('startBtn').style.background = "#555";

            // ----------------------------------------------------
            // ★ 핵심 1: [제목] / 【챕터】 등 불필요한 괄호 문구 제거 ★
            // ----------------------------------------------------
            const lines = rawText.split('\n').map(l => l.trim()).filter(l => l !== '');
            let cleanScript = "";
            let removedCount = 0;

            for (const line of lines) {
                // 맨 앞이 대괄호([, ])나 꺾쇠(【, 】)로 둘러싸인 '제목/안내문'인 경우 (대사가 아닌 경우)
                // 정규식: ^\[.*\]$ 또는 ^【.*】$ (문장 전체가 괄호로 묶여있을 때 제거)
                if (line.match(/^\[.*\]$/) || line.match(/^【.*】$/)) {
                    addLog(`🗑️ 낭독 제외됨: <span class="filtered-text">${line}</span>`, 'info');
                    removedCount++;
                    continue; // 이 줄은 건너뜀 (안 읽음)
                }
                
                // 본문 텍스트에 2초 무음 지시문 삽입
                cleanScript += line + "\n[2초간 완전한 침묵]\n"; 
            }

            addLog(`✅ 총 ${removedCount}개의 제목 태그를 제거하고 대본을 정리했습니다.`, 'success');

            // ----------------------------------------------------
            // ★ 핵심 2: 구글에 쏠 완벽한 프롬프트(명령서) 조립 ★
            // ----------------------------------------------------
            const masterPrompt = `
당신은 최고의 전문 성우 'Zephyr' 입니다. 
모드: single-speaker audio
말투/톤: ${selectedTone}

아래 제공되는 대본을 읽어주세요.
【가장 중요한 절대 규칙】
1. 각 문장이 끝날 때마다 명시된 "[2초간 완전한 침묵]" 지시를 반드시 지키세요. 실제로 아무 소리도, 숨소리도 내지 않고 정확히 2초를 쉬어야 합니다.
2. 음악, 효과음, 환경음 없이 오직 깨끗한 목소리만 출력하세요.

대본:
"${cleanScript}"
`;

            try {
                addLog(`📡 구글(Temperature 1.35 셋팅)에 통짜 요청을 전송합니다!`, 'warn');
                
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: masterPrompt }] }],
                        generationConfig: { 
                            responseMimeType: "audio/mp3",
                            temperature: 1.35 // GD님이 요청하신 고정 옵션 적용!
                        }
                    })
                });

                if (response.status === 429) {
                    throw new Error("429 에러! 방금 전 작업의 쿨타임(1분)이 아직 안 끝났거나 IP가 막혔습니다. 키를 교체하세요.");
                }
                if (!response.ok) throw new Error(`API Error ${response.status}`);

                const data = await response.json();
                if (data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data) {
                    const base64Audio = data.candidates[0].content.parts[0].inlineData.data;
                    const byteCharacters = atob(base64Audio);
                    const byteNumbers = new Array(byteCharacters.length);
                    for (let i = 0; i < byteCharacters.length; i++) byteNumbers[i] = byteCharacters.charCodeAt(i);
                    const mp3Blob = new Blob([new Uint8Array(byteNumbers)], { type: 'audio/mp3' });

                    addLog(`🎉 완벽합니다! 거대한 MP3 파일 다운로드를 시작합니다!`, 'success');
                    
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(mp3Blob);
                    link.download = `GD_Story_VrewReady.mp3`;
                    link.click();
                    
                    addLog(`💡 다음 단계: 다운받은 MP3를 VREW에 넣고 [무음 구간 줄이기]를 실행하면 자막이 예쁘게 나뉩니다!`, 'info');

                } else {
                    throw new Error('구글이 오디오를 생성하지 못했습니다. (텍스트로만 응답함)');
                }

            } catch (e) {
                addLog(`❌ [실패] ${e.message}`, 'error');
            } finally {
                isRunning = false;
                document.getElementById('startBtn').innerText = "🔥 대본 정리 & 2초 무음 컷팅으로 MP3 뽑아내기!";
                document.getElementById('startBtn').style.background = "#00e676";
            }
        }
    </script>
</body>
</html>
