<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GD TTS Studio v4.0 (Tier-1 Edition)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .header { background: #16213e; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e94560; }
        .header h1 { font-size: 1.4em; color: #e94560; text-shadow: 0 0 10px rgba(233,69,96,0.5); }
        .header .version { color: #2ecc71; font-size: 0.85em; font-weight: bold; }
        .api-bar { background: #0f3460; padding: 12px 30px; border-bottom: 1px solid #333; }
        .api-bar label { color: #f1c40f; font-size: 0.9em; display: block; margin-bottom: 5px; font-weight: bold; }
        .api-bar textarea { width: 100%; padding: 8px 12px; background: #1a1a2e; border: 1px solid #444; color: #eee; border-radius: 4px; font-size: 0.85em; font-family: 'D2Coding', monospace; resize: none; height: 60px; }
        .api-bar .hint { color: #aaa; font-size: 0.75em; margin-top: 4px; }
        .key-status { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
        .key-badge { padding: 3px 10px; border-radius: 12px; font-size: 0.75em; font-weight: bold; }
        .key-badge.ready { background: #2ecc71; color: #fff; }
        .key-badge.active { background: #e94560; color: #fff; box-shadow: 0 0 8px #e94560; }
        .key-badge.used { background: #555; color: #aaa; }
        .key-badge.exhausted { background: #c0392b; color: #fff; }
        .tabs { display: flex; background: #16213e; border-bottom: 1px solid #333; }
        .tab { padding: 12px 24px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; transition: all 0.3s; font-size: 0.9em; }
        .tab:hover { color: #ccc; background: #1a1a2e; }
        .tab.active { color: #e94560; border-bottom-color: #e94560; font-weight: bold; background: #1a1a2e; }
        .tab-content { display: none; padding: 20px 30px; }
        .tab-content.active { display: block; }
        textarea.script-input { width: 100%; background: #0f3460; border: 1px solid #444; color: #eee; padding: 15px; border-radius: 6px; font-size: 0.95em; line-height: 1.6; resize: vertical; font-family: 'D2Coding', monospace; }
        .btn { padding: 10px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95em; font-weight: bold; transition: all 0.2s; }
        .btn-primary { background: #e94560; color: white; }
        .btn-primary:hover { background: #c73550; transform: translateY(-1px); }
        .btn-secondary { background: #0f3460; color: #eee; border: 1px solid #444; }
        .btn-secondary:hover { background: #16213e; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-success:hover { background: #27ae60; transform: translateY(-1px); }
        .btn-warning { background: #f39c12; color: white; }
        .btn-warning:hover { background: #e67e22; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .char-table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        .char-table th, .char-table td { padding: 10px; border: 1px solid #333; text-align: left; }
        .char-table th { background: #0f3460; color: #e94560; }
        .char-table td { background: #16213e; }
        .char-table select { background: #1a1a2e; color: #eee; border: 1px solid #444; padding: 5px; border-radius: 4px; }
        .progress-container { margin: 20px 0; }
        .progress-bar { height: 28px; background: #0f3460; border-radius: 14px; overflow: hidden; position: relative; border: 1px solid #333; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #e94560, #ff6b6b); transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 14px; }
        .progress-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 0.9em; font-weight: bold; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin: 15px 0; }
        .stat-box { background: #16213e; padding: 15px 10px; border-radius: 8px; text-align: center; border: 1px solid #333; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .stat-box .num { font-size: 1.6em; color: #e94560; font-weight: bold; }
        .stat-box .label { font-size: 0.8em; color: #aaa; margin-top: 5px; }
        .log-area { background: #0a0a1a; border: 1px solid #333; border-radius: 6px; padding: 12px; height: 300px; overflow-y: auto; font-family: 'D2Coding', monospace; font-size: 0.85em; line-height: 1.6; }
        .log-ok { color: #2ecc71; }
        .log-err { color: #e74c3c; font-weight: bold; }
        .log-info { color: #3498db; }
        .log-warn { color: #f1c40f; }
        .result-item { display: flex; align-items: center; gap: 10px; padding: 10px 15px; background: #16213e; border-radius: 6px; margin: 6px 0; border: 1px solid #333; }
        .result-item .idx { color: #e94560; font-weight: bold; min-width: 45px; font-size: 1.1em; }
        .result-item .info { flex: 1; font-size: 0.9em; color: #ccc; }
        .result-item audio { height: 36px; outline: none; }
        .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 15px 0; }
        .setting-item { background: #16213e; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .setting-item label { display: block; color: #aaa; font-size: 0.85em; margin-bottom: 8px; }
        .setting-item input, .setting-item select { width: 100%; padding: 8px 12px; background: #1a1a2e; border: 1px solid #444; color: #eee; border-radius: 4px; font-size: 0.95em; }
        .batch-info { background: rgba(52, 152, 219, 0.1); padding: 15px; border-radius: 6px; border-left: 4px solid #3498db; margin: 15px 0; font-size: 0.9em; color: #bdc3c7; }
        .resume-banner { background: rgba(243, 156, 18, 0.1); padding: 15px 20px; border-radius: 8px; border: 2px solid #f39c12; margin: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .resume-banner .msg { color: #f1c40f; font-size: 0.95em; font-weight: bold; }
        .resume-banner .btns { display: flex; gap: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="header">
        <h1>GD TTS Studio</h1>
        <span class="version">v4.0 — 정식 모델 교체 + 풀악셀 모드 🚀</span>
    </div>
    <div class="api-bar">
        <label>Tier-1 유료 결제 계정 API 키 입력 (1개만 넣어도 충분!)</label>
        <textarea id="apiKeys" placeholder="AIzaSy..."></textarea>
        <div class="hint">정식 모델(2.5-flash-tts) 적용. 결제 연동된 키를 넣으면 1분 10번 제한 없이 고속 처리됩니다.</div>
        <div class="key-status" id="keyStatus"></div>
    </div>
    <div class="tabs">
        <div class="tab active" onclick="switchTab(0)">1. 대본 입력</div>
        <div class="tab" onclick="switchTab(1)">2. 캐릭터 확인</div>
        <div class="tab" onclick="switchTab(2)">3. TTS 생성</div>
        <div class="tab" onclick="switchTab(3)">4. 결과</div>
        <div class="tab" onclick="switchTab(4)">5. VREW 변환</div>
    </div>
    
    <!-- 탭 1: 대본 입력 -->
    <div class="tab-content active" id="tab0">
        <h3 style="margin-bottom:10px; color:#e94560;">사연 대본 붙여넣기</h3>
        <input type="file" id="scriptFile" accept=".txt" style="margin-bottom:10px;color:#aaa;" onchange="loadScriptFile(event)">
        <textarea class="script-input" id="scriptInput" rows="20" placeholder="[캐릭터/나레이션/성별:남/나이:40대/톤:차분하고 깊은 목소리]
[나레이션/담담하게] 그 해 겨울은 유난히 길었다."></textarea>
        <div style="margin-top:15px;display:flex;gap:10px;">
            <button class="btn btn-primary" onclick="parseScript()">대본 분석 시작</button>
            <button class="btn btn-secondary" onclick="loadSample()">테스트 샘플 로드</button>
        </div>
    </div>

    <!-- 탭 2: 캐릭터 매칭 -->
    <div class="tab-content" id="tab1">
        <h3 style="margin-bottom:10px; color:#e94560;">등장인물 & 목소리 배정</h3>
        <div id="charTableArea"></div>
        <div style="margin-top:15px;">
            <button class="btn btn-primary" onclick="confirmChars()">확인 완료 → TTS 공장으로 이동</button>
        </div>
    </div>

    <!-- 탭 3: TTS 생성 -->
    <div class="tab-content" id="tab2">
        <div id="resumeBanner" class="resume-banner hidden">
            <div class="msg" id="resumeMsg"></div>
            <div class="btns">
                <button class="btn btn-warning" onclick="resumeGeneration()">이어하기</button>
                <button class="btn btn-secondary" onclick="discardSaved()">싹 다 지우고 처음부터</button>
            </div>
        </div>
        <div class="batch-info" id="batchInfo"></div>
        <div class="stats">
            <div class="stat-box"><div class="num" id="statTotal">0</div><div class="label">전체 대사</div></div>
            <div class="stat-box"><div class="num" id="statDone" style="color:#2ecc71;">0</div><div class="label">완료됨</div></div>
            <div class="stat-box"><div class="num" id="statFail" style="color:#e74c3c;">0</div><div class="label">실패/에러</div></div>
            <div class="stat-box"><div class="num" id="statKey">1/1</div><div class="label">현재 키 번호</div></div>
            <div class="stat-box"><div class="num" id="statTime">--:--</div><div class="label">예상 남은시간</div></div>
            <div class="stat-box"><div class="num" id="statDuration">0s</div><div class="label">총 오디오 길이</div></div>
        </div>
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
                <div class="progress-text" id="progressText">대기 중... 0%</div>
            </div>
        </div>
        <div style="margin:20px 0;display:flex;gap:10px;">
            <button class="btn btn-primary" id="btnStart" onclick="startGeneration()" style="font-size:1.1em; padding:12px 30px;">▶ 풀악셀 시작!</button>
            <button class="btn btn-warning" id="btnRetry" onclick="retryFailed()" style="display:none;">실패건만 싹 모아서 재시도</button>
            <button class="btn btn-secondary" id="btnPause" onclick="pauseGeneration()" disabled>일시정지</button>
            <button class="btn btn-secondary" id="btnStop" onclick="stopGeneration()" disabled>완전 중지</button>
        </div>
        <div class="log-area" id="logArea"></div>
    </div>

    <!-- 탭 4: 결과 -->
    <div class="tab-content" id="tab3">
        <h3 style="margin-bottom:15px; color:#e94560;">오디오 파일 생성 결과</h3>
        <div style="margin-bottom:15px;display:flex;gap:10px;">
            <button class="btn btn-success" onclick="downloadAllZip()">전체 MP3 압축 다운로드</button>
            <button class="btn btn-secondary" onclick="downloadMapping()">대본 매칭 데이터 다운로드</button>
        </div>
        <div id="resultsList"></div>
    </div>

    <!-- 탭 5: 브루 변환 -->
    <div class="tab-content" id="tab4">
        <h3 style="margin-bottom:15px; color:#e94560;">VREW 프로젝트 즉시 생성</h3>
        <div class="settings-grid">
            <div class="setting-item">
                <label>영상 해상도 (유튜브용)</label>
                <select id="vrewRes">
                    <option value="1920x1080">1920×1080 (가로 영상)</option>
                    <option value="1080x1920">1080×1920 (쇼츠/세로)</option>
                </select>
            </div>
            <div class="setting-item"><label>목소리 기본 볼륨</label><input type="number" id="vrewVol" value="1.0" step="0.1"></div>
            <div class="setting-item"><label>자막 폰트</label><input type="text" id="vrewFont" value="NanumSquare Neo ExtraBold"></div>
            <div class="setting-item"><label>자막 크기 (가독성 중요)</label><input type="number" id="vrewFontSize" value="170"></div>
            <div class="setting-item"><label>자막 색상</label><input type="color" id="vrewFontColor" value="#ffffff"></div>
        </div>
        <div id="vrewPreview" style="margin:20px 0;max-height:300px;overflow-y:auto; border:1px solid #333; padding:10px; border-radius:6px; background:#16213e;"></div>
        <button class="btn btn-success" onclick="generateVrew()" style="font-size:1.2em;padding:15px 40px; width:100%;">🚀 VREW 편집 파일 (.vrew) 통째로 다운로드!</button>
    </div>

<script>
// 전역 변수
let characters = {}; let scriptLines = []; let ttsRequests = []; let audioBlobs = {}; let generatedClips = []; let failedItems = [];
let isRunning = false; let isPaused = false; let totalDuration = 0; let completedCount = 0; let failedCount = 0; let startTime = 0;
let apiKeys = []; let currentKeyIndex = 0; let keyUsageCounts = [];

// ★★★ 설정값 (풀악셀 세팅) ★★★
const REQUEST_DELAY = 1500; // 1.5초 간격으로 초고속 요청!
const MAX_RETRY = 3;        // 에러 나면 3번까지 재도전
const NARRATION_MERGE_MAX = 6;
const DB_NAME = 'GD_TTS_Studio'; const DB_VERSION = 2; const STORE_NAME = 'tts_progress';

const ALL_VOICES = [
    {name:"Zephyr",desc:"밝은"},{name:"Puck",desc:"활기찬"},{name:"Charon",desc:"정보전달"},{name:"Kore",desc:"확고한"},
    {name:"Fenrir",desc:"당당한"},{name:"Leda",desc:"젊은 여성"},{name:"Orus",desc:"확고한 남성"},{name:"Aoede",desc:"즐거운"},
    {name:"Callirrhoe",desc:"편안한 여성"},{name:"Autonoe",desc:"밝은 여성"},{name:"Enceladus",desc:"차분한"},{name:"Iapetus",desc:"명확한"},
    {name:"Umbriel",desc:"편안한"},{name:"Algieba",desc:"부드러운"},{name:"Despina",desc:"부드러운 여성"},{name:"Erinome",desc:"명확한 여성"},
    {name:"Gacrux",desc:"성숙한 여성"},{name:"Pulcherrima",desc:"앞선 여성"},{name:"Procyon",desc:"자신감 남성"},{name:"Castor",desc:"캐주얼 남성"},
    {name:"Pollux",desc:"따뜻한 남성"},{name:"Dione",desc:"사려깊은 여성"},{name:"Oberon",desc:"발랄한 남성"},{name:"Tethys",desc:"차분한 여성"},
    {name:"Proteus",desc:"미디엄 남성"},{name:"Ganymede",desc:"허스키 남성"},{name:"Titania",desc:"침착한 여성"},{name:"Sadaltager",desc:"지적 남성"},
    {name:"Schedar",desc:"대화적 여성"},{name:"Zubenelgenubi",desc:"캐주얼 여성"}
];

const VOICE_AUTO_MAP = {
    "남_10대":"Puck","남_20대":"Orus","남_30대":"Charon","남_40대":"Charon","남_50대":"Fenrir","남_60대":"Sadaltager","남_70대":"Ganymede",
    "여_아동":"Leda","여_10대":"Leda","여_20대":"Aoede","여_30대":"Callirrhoe","여_40대":"Erinome","여_50대":"Gacrux","여_60대":"Gacrux","여_70대":"Gacrux",
    "남_기본":"Charon","여_기본":"Aoede"
};

function autoMatchVoice(gender, ageStr) {
    let ageNum = parseInt(ageStr);
    if (!isNaN(ageNum)) {
        if (ageNum <= 12) { let k = (gender === "남" ? "남" : "여") + "_아동"; if (VOICE_AUTO_MAP[k]) return VOICE_AUTO_MAP[k]; }
        let decade = Math.floor(ageNum / 10) * 10;
        if (decade < 10) decade = 10; if (decade > 70) decade = 70;
        let k = gender + "_" + decade + "대";
        if (VOICE_AUTO_MAP[k]) return VOICE_AUTO_MAP[k];
    }
    return VOICE_AUTO_MAP[gender + "_기본"] || "Charon";
}

function parseApiKeys() {
    const raw = document.getElementById('apiKeys').value.trim();
    apiKeys = raw.split(',').map(k => k.trim()).filter(k => k.length > 10);
    keyUsageCounts = apiKeys.map(() => 0);
    currentKeyIndex = 0;
    updateKeyStatus();
    return apiKeys.length;
}
function getCurrentKey() { return apiKeys[currentKeyIndex]; }
function switchToNextKey(reason) {
    const oldIdx = currentKeyIndex;
    currentKeyIndex++;
    if (currentKeyIndex >= apiKeys.length) return false;
    addLog(`\n🔑 릴레이 전환: #${oldIdx+1} → #${currentKeyIndex+1} (${reason})`, 'warn');
    updateKeyStatus();
    return true;
}
function updateKeyStatus() {
    const area = document.getElementById('keyStatus');
    let html = '';
    for (let i = 0; i < apiKeys.length; i++) {
        let cls = 'ready', label = `키${i+1}: 대기`;
        if (i < currentKeyIndex) { cls = 'exhausted'; label = `키${i+1}: 사용완료`; }
        else if (i === currentKeyIndex) { cls = 'active'; label = `키${i+1}: 사용 중`; }
        html += `<span class="key-badge ${cls}">${label}</span>`;
    }
    area.innerHTML = html;
    document.getElementById('statKey').textContent = `${currentKeyIndex+1}/${apiKeys.length}`;
}

function openDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => { const db = e.target.result; if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: 'id' }); };
        req.onsuccess = (e) => resolve(e.target.result); req.onerror = (e) => reject(e.target.error);
    });
}
async function saveProgress(index, clipData, mp3Blob) {
    try {
        const db = await openDB(); const tx = db.transaction(STORE_NAME, 'readwrite'); const store = tx.objectStore(STORE_NAME);
        store.put({ id: 'clip_' + index, clipData, audioData: await mp3Blob.arrayBuffer(), timestamp: Date.now() });
        store.put({ id: 'meta', ttsRequests, characters, completedCount, failedCount, totalDuration, failedItems, timestamp: Date.now() });
    } catch(e) {}
}
async function loadSavedProgress() {
    try {
        const db = await openDB(); const tx = db.transaction(STORE_NAME, 'readonly'); const store = tx.objectStore(STORE_NAME);
        const meta = await new Promise((r,j) => { const q=store.get('meta'); q.onsuccess=()=>r(q.result); q.onerror=()=>j(q.error); });
        if (!meta) return null;
        const allKeys = await new Promise((r,j) => { const q=store.getAllKeys(); q.onsuccess=()=>r(q.result); q.onerror=()=>j(q.error); });
        const savedClips = [];
        for (const key of allKeys) {
            if (key.startsWith('clip_')) {
                const data = await new Promise((r,j) => { const q=store.get(key); q.onsuccess=()=>r(q.result); q.onerror=()=>j(q.error); });
                if (data) savedClips.push(data);
            }
        }
        return { meta, savedClips };
    } catch(e) { return null; }
}
async function clearSavedProgress() { try { const db = await openDB(); db.transaction(STORE_NAME, 'readwrite').objectStore(STORE_NAME).clear(); } catch(e) {} }

function switchTab(idx) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
    document.querySelectorAll('.tab-content').forEach((c,i) => c.classList.toggle('active', i===idx));
    if (idx === 2) checkForSavedProgress(); if (idx === 3) renderResults(); if (idx === 4) renderVrewPreview();
}

function loadScriptFile(event) {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader(); reader.onload = (e) => { document.getElementById('scriptInput').value = e.target.result; }; reader.readAsText(file);
}
function loadSample() {
    document.getElementById('scriptInput').value = `[캐릭터/나레이션/성별:남/나이:40대/톤:차분하고 깊은 목소리로 이야기를 들려주는 내레이터]
[캐릭터/막순/성별:여/나이:70대/톤:거칠지만 따뜻한 전라도 사투리 할머니]

[나레이션/담담하게] 그 해 겨울은 유난히 길었다.
[막순/걱정스럽게] "소이야, 손이 시릴 텐디... 장갑은 꼈어?"`;
}
function parseScript() {
    const text = document.getElementById('scriptInput').value;
    if (!text.trim()) { alert('대본을 입력하세요.'); return; }
    characters = {}; scriptLines = [];
    for (const line of text.split('\n')) {
        const t = line.trim(); if (!t) continue;
        const cm = t.match(/^\[캐릭터\/(.+?)\/성별:(.+?)\/나이:(.+?)\/톤:(.+?)(?:\/음성:(.+?))?\]$/);
        if (cm) { characters[cm[1]] = { gender:cm[2].trim(), age:cm[3].trim(), tone:cm[4].trim(), voice:cm[5]?cm[5].trim():autoMatchVoice(cm[2].trim(),cm[3].trim()) }; continue; }
        const lm = t.match(/^\[(.+?)\/(.+?)\]\s*(.+)$/);
        if (lm) { scriptLines.push({ type:lm[1].trim()==='나레이션'?'narration':'dialogue', speaker:lm[1].trim(), emotion:lm[2].trim(), text:lm[3].trim().replace(/^"|"$/g,'') }); continue; }
        const sm = t.match(/^\[장면\/(.+?)\]$/);
        if (sm) scriptLines.push({ type:'scene', description:sm[1] });
    }
    ttsRequests = []; let i = 0;
    while (i < scriptLines.length) {
        if (scriptLines[i].type === 'narration') {
            let merged = [scriptLines[i]], j = i + 1;
            while (j < scriptLines.length && scriptLines[j].type === 'narration' && scriptLines[j].speaker === scriptLines[i].speaker && scriptLines[j].emotion === scriptLines[i].emotion && merged.length < NARRATION_MERGE_MAX) { merged.push(scriptLines[j]); j++; }
            ttsRequests.push({ type:'narration', speaker:merged[0].speaker, emotion:merged[0].emotion, text:merged.map(m=>m.text).join(' '), mergedCount:merged.length }); i = j;
        } else if (scriptLines[i].type === 'dialogue') {
            ttsRequests.push({ type:'dialogue', speaker:scriptLines[i].speaker, emotion:scriptLines[i].emotion, text:scriptLines[i].text }); i++;
        } else { ttsRequests.push(scriptLines[i]); i++; }
    }
    addLog(`대본 분석 완료: 캐릭터 ${Object.keys(characters).length}명, 생성할 대사 ${ttsRequests.filter(r=>r.type!=='scene').length}줄`, 'info');
    switchTab(1); renderCharTable();
}
function renderCharTable() {
    const area = document.getElementById('charTableArea');
    let html = '<table class="char-table"><tr><th>캐릭터</th><th>성별/나이</th><th>요청 톤</th><th>AI 목소리 매칭</th></tr>';
    for (const [name, info] of Object.entries(characters)) {
        html += `<tr><td><strong>${name}</strong></td><td>${info.gender} ${info.age}</td><td style="font-size:0.85em;">${info.tone}</td><td><select onchange="characters['${name}'].voice=this.value">`;
        for (const v of ALL_VOICES) html += `<option value="${v.name}" ${v.name===info.voice?'selected':''}>${v.name} — ${v.desc}</option>`;
        html += `</select></td></tr>`;
    }
    html += '</table>'; area.innerHTML = html;
}
function confirmChars() {
    switchTab(2);
    const cnt = ttsRequests.filter(r=>r.type!=='scene').length; document.getElementById('statTotal').textContent = cnt;
    const keyCnt = parseApiKeys();
    document.getElementById('batchInfo').innerHTML = `💡 1티어 유료 모델(2.5-flash-tts) 모드 가동 대기 중.<br>예상 소요시간: 딜레이 1.5초 기준, ${Math.ceil(cnt * 1.5 / 60)}분 내외 폭풍 처리!`;
}

async function checkForSavedProgress() {
    const saved = await loadSavedProgress();
    if (saved && saved.meta && saved.savedClips.length > 0) {
        const total = saved.meta.ttsRequests ? saved.meta.ttsRequests.filter(r=>r.type!=='scene').length : '?';
        document.getElementById('resumeMsg').textContent = `앗! 이전에 만들다 만 파일이 있습니다 (${saved.savedClips.length}/${total}건). 이어서 뽑을까요?`;
        document.getElementById('resumeBanner').classList.remove('hidden');
    }
}
async function resumeGeneration() {
    const saved = await loadSavedProgress(); if (!saved) return;
    ttsRequests = saved.meta.ttsRequests; characters = saved.meta.characters;
    completedCount = saved.meta.completedCount || 0; failedCount = 0; totalDuration = saved.meta.totalDuration || 0; failedItems = [];
    audioBlobs = {}; generatedClips = [];
    for (const cs of saved.savedClips) { const blob = new Blob([cs.audioData], { type: 'audio/mp3' }); audioBlobs[cs.clipData.ttsIndex] = blob; generatedClips.push(cs.clipData); }
    document.getElementById('resumeBanner').classList.add('hidden');
    addLog(`복원 완료! 멈춘 곳부터 다시 달립니다.`, 'warn'); startGeneration(true);
}
async function discardSaved() { await clearSavedProgress(); document.getElementById('resumeBanner').classList.add('hidden'); audioBlobs = {}; generatedClips = []; failedItems = []; completedCount = 0; failedCount = 0; totalDuration = 0; addLog('과거 기록 깔끔하게 삭제 완료!', 'ok'); }

async function startGeneration(isResume = false) {
    const keyCnt = parseApiKeys();
    if (keyCnt === 0) { alert('API 키를 입력하세요.'); return; }
    if (ttsRequests.length === 0 && !isResume) { alert('먼저 1번 탭에서 대본을 분석하세요.'); return; }
    isRunning = true; isPaused = false;
    document.getElementById('btnStart').disabled = true; document.getElementById('btnPause').disabled = false; document.getElementById('btnStop').disabled = false; document.getElementById('btnRetry').style.display = 'none';
    startTime = Date.now();
    if (!isResume) { audioBlobs = {}; generatedClips = []; failedItems = []; completedCount = 0; failedCount = 0; totalDuration = 0; await clearSavedProgress(); }
    
    const ttsOnly = ttsRequests.filter(r => r.type !== 'scene');
    const totalTts = ttsOnly.length;
    addLog(`\n🚀 [작업 시작] 총 ${totalTts}건 | 모델: gemini-2.5-flash-tts 정식버전`, 'info');

    let ttsIndex = 0;
    for (let i = 0; i < ttsOnly.length; i++) {
        if (!isRunning) break;
        while (isPaused) { await sleep(500); if (!isRunning) break; }
        if (!isRunning) break;
        
        ttsIndex++;
        const req = ttsOnly[i];
        const fileNum = String(ttsIndex).padStart(3, '0');
        if (audioBlobs[fileNum]) { addLog(`[${fileNum}/${totalTts}] 이미 뽑아둔 파일, 패스!`, 'warn'); continue; }
        
        const charInfo = characters[req.speaker] || {}; const voice = charInfo.voice || 'Charon';
        let prompt = req.type === 'narration' ? `당신은 ${charInfo.tone || '내레이터'}입니다. ${req.emotion} 감정으로 읽으세요:\n${req.text}` : `당신은 ${charInfo.gender||''} ${charInfo.age||''} ${charInfo.tone||''}입니다. ${req.emotion} 감정으로 연기하세요:\n${req.text}`;

        let success = false;
        for (let retry = 0; retry < MAX_RETRY; retry++) {
            try {
                addLog(`[${fileNum}/${totalTts}] 🎤 ${req.speaker} (${voice})${retry>0?' [재도전]':''}`, 'info');
                
                // ★★★ 핵심: preview 딱지 뗀 정식 모델 URL ★★★
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-tts:generateContent?key=${getCurrentKey()}`,
                    { method:'POST', headers:{'Content-Type':'application/json'},
                      body: JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{ response_modalities:["AUDIO"], speech_config:{ voiceConfig:{ prebuiltVoiceConfig:{ voiceName:voice }}}}})
                    }
                );

                if (!response.ok) {
                    let errMsg = ''; let detailedReason = '';
                    try { const errData = await response.json(); errMsg = JSON.stringify(errData); if(errData.error && errData.error.message) detailedReason = errData.error.message; } catch(e) { detailedReason = '응답 없음'; }

                    if (response.status === 429) {
                        // 정식 버전에서도 혹시나 렉 걸려서 에러 나면, 5초만 숨 고르고 다시 찌름
                        addLog(`⚠️ 일시적 속도 제한 감지. (5초만 숨 고르고 다시 찌릅니다)`, 'warn');
                        await sleep(5000); 
                        retry--; continue;
                    }
                    throw new Error(`API ${response.status}: ${detailedReason.substring(0, 50)}`);
                }

                const data = await response.json();
                const audioData = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                if (!audioData) throw new Error('음성 데이터가 안 왔어요 ㅠㅠ');
                
                const pcmBytes = Uint8Array.from(atob(audioData), c => c.charCodeAt(0));
                const wavBlob = pcmToWav(pcmBytes, 24000); const duration = pcmBytes.length / (24000 * 2);
                const mp3Blob = await wavBlobToMp3Blob(wavBlob); audioBlobs[fileNum] = mp3Blob;
                const clipData = { ttsIndex:fileNum, type:req.type, speaker:req.speaker, emotion:req.emotion, text:req.text, voice, audioFile:fileNum+'.mp3', duration:Math.round(duration*1000)/1000 };
                
                generatedClips.push(clipData); totalDuration += duration; completedCount++; 
                await saveProgress(fileNum, clipData, mp3Blob); updateStats(totalTts); 
                addLog(`  ✅ ${fileNum}.mp3 저장 완료! (${duration.toFixed(1)}초)`, 'ok');
                success = true; break;
            } catch (err) {
                addLog(`  ❌ 실패: ${err.message}`, 'err');
                if (retry < MAX_RETRY - 1) { await sleep(3000); } // 일반 에러면 3초 쉬고 재도전
            }
        }
        if (!success) { failedCount++; failedItems.push({ index: ttsIndex, fileNum, req }); updateStats(totalTts); }
        if (isRunning && i < ttsOnly.length - 1) await sleep(REQUEST_DELAY); // 풀악셀 딜레이(1.5초) 적용
    }

    isRunning = false; document.getElementById('btnStart').disabled = false; document.getElementById('btnPause').disabled = true; document.getElementById('btnStop').disabled = true;
    addLog(`\n🎉 [완료] 성공: ${completedCount}건, 에러: ${failedCount}건`, 'ok');
    if (failedItems.length > 0) document.getElementById('btnRetry').style.display = 'inline-block';
}

async function retryFailed() {
    if (failedItems.length === 0) return;
    isRunning = true; document.getElementById('btnRetry').style.display = 'none'; document.getElementById('btnStop').disabled = false;
    const items = [...failedItems]; failedItems = []; failedCount = 0;
    addLog(`\n🔄 실패했던 ${items.length}건 멱살 잡고 다시 뽑습니다!`, 'info');
    
    for (const item of items) {
        if (!isRunning) break;
        const { fileNum, req } = item;
        const charInfo = characters[req.speaker] || {}; const voice = charInfo.voice || 'Charon';
        let prompt = req.type === 'narration' ? `당신은 ${charInfo.tone || '내레이터'}입니다. ${req.emotion} 감정으로 읽으세요:\n${req.text}` : `당신은 ${charInfo.gender||''} ${charInfo.age||''} ${charInfo.tone||''}입니다. ${req.emotion} 감정으로 연기하세요:\n${req.text}`;
        
        let success = false;
        for (let retry = 0; retry < MAX_RETRY; retry++) {
            try {
                addLog(`[재생성 ${fileNum}] 🎤 ${req.speaker}`, 'info');
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-tts:generateContent?key=${getCurrentKey()}`,
                    { method:'POST', headers:{'Content-Type':'application/json'},
                      body: JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{ response_modalities:["AUDIO"], speech_config:{ voiceConfig:{ prebuiltVoiceConfig:{ voiceName:voice }}}}})
                    }
                );
                
                if (!response.ok) {
                    if (response.status === 429) { await sleep(5000); retry--; continue; }
                    throw new Error(`API ${response.status}`);
                }
                const data = await response.json(); const audioData = data.candidates[0].content.parts[0].inlineData.data;
                const pcmBytes = Uint8Array.from(atob(audioData), c => c.charCodeAt(0));
                const wavBlob = pcmToWav(pcmBytes, 24000); const duration = pcmBytes.length / (24000 * 2);
                const mp3Blob = await wavBlobToMp3Blob(wavBlob); audioBlobs[fileNum] = mp3Blob;
                const clipData = { ttsIndex:fileNum, type:req.type, speaker:req.speaker, emotion:req.emotion, text:req.text, voice, audioFile:fileNum+'.mp3', duration:Math.round(duration*1000)/1000 };
                generatedClips.push(clipData); totalDuration += duration; completedCount++; 
                await saveProgress(fileNum, clipData, mp3Blob); 
                addLog(`  ✅ 복구 성공!`, 'ok');
                success = true; break;
            } catch(err) { addLog(`  ❌ 복구 실패: ${err.message}`, 'err'); if (retry < MAX_RETRY - 1) await sleep(3000); }
        }
        if (!success) { failedItems.push(item); failedCount++; }
        await sleep(REQUEST_DELAY);
    }
    isRunning = false; document.getElementById('btnStop').disabled = true; updateStats(completedCount+failedCount);
    if (failedItems.length > 0) { document.getElementById('btnRetry').style.display = 'inline-block'; addLog(`끝까지 속 썩이는 ${failedItems.length}건 남음...`, 'err'); }
    else { addLog('전체 퍼펙트 완료!!', 'ok'); }
}

function pauseGeneration() { isPaused = !isPaused; document.getElementById('btnPause').textContent = isPaused ? '재개' : '일시정지'; addLog(isPaused ? '⏸ 잠깐 멈춤' : '▶ 다시 달립니다', 'warn'); }
function stopGeneration() { isRunning = false; isPaused = false; addLog('⏹ 강제 중지 완료.', 'err'); document.getElementById('btnStart').disabled = false; document.getElementById('btnPause').disabled = true; document.getElementById('btnStop').disabled = true; }
function updateStats(total) { document.getElementById('statDone').textContent = completedCount; document.getElementById('statFail').textContent = failedCount; document.getElementById('statDuration').textContent = formatDuration(totalDuration); const pct = Math.round((completedCount + failedCount) / total * 100); document.getElementById('progressFill').style.width = pct + '%'; document.getElementById('progressText').textContent = pct + '%'; const elapsed = (Date.now() - startTime) / 1000; const remaining = (elapsed / Math.max(completedCount + failedCount, 1)) * (total - completedCount - failedCount); document.getElementById('statTime').textContent = formatDuration(remaining); }

function pcmToWav(pcmData, sampleRate) { const h = new ArrayBuffer(44); const v = new DataView(h); const w = (o,s) => { for(let i=0;i<s.length;i++) v.setUint8(o+i,s.charCodeAt(i)); }; w(0,'RIFF'); v.setUint32(4,36+pcmData.length,true); w(8,'WAVE'); w(12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true); v.setUint32(24,sampleRate,true); v.setUint32(28,sampleRate*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true); w(36,'data'); v.setUint32(40,pcmData.length,true); return new Blob([h, pcmData], { type: 'audio/wav' }); }
function wavBlobToMp3Blob(wavBlob) { return new Promise((resolve, reject) => { const reader = new FileReader(); reader.onload = function() { try { const buf = new Int16Array(this.result, 44); const enc = new lamejs.Mp3Encoder(1, 24000, 192); const parts = []; const bs = 1152; for (let i=0; i<buf.length; i+=bs) { const c=buf.subarray(i,i+bs); const m=enc.encodeBuffer(c); if(m.length>0) parts.push(m); } const e = enc.flush(); if(e.length>0) parts.push(e); resolve(new Blob(parts, { type: 'audio/mp3' })); } catch(e) { reject(e); } }; reader.readAsArrayBuffer(wavBlob); }); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function formatDuration(s) { const m=Math.floor(s/60); return `${m}:${String(Math.floor(s%60)).padStart(2,'0')}`; }
function addLog(msg, type='ok') { const a=document.getElementById('logArea'); const d=document.createElement('div'); d.className='log-'+type; d.textContent=msg; a.appendChild(d); a.scrollTop=a.scrollHeight; }

function renderResults() { const list = document.getElementById('resultsList'); if (generatedClips.length === 0) { list.innerHTML = '<p style="color:#888;">생성된 오디오가 없습니다.</p>'; return; } let html = ''; for (const clip of [...generatedClips].sort((a,b) => a.ttsIndex.localeCompare(b.ttsIndex))) { const blob = audioBlobs[clip.ttsIndex]; const url = blob ? URL.createObjectURL(blob) : ''; html += `<div class="result-item"><div class="idx">${clip.ttsIndex}</div><div class="info"><strong>${clip.speaker}</strong><br><small>${clip.text.substring(0,40)}...</small></div>${url?`<audio controls src="${url}"></audio>`:''}</div>`; } list.innerHTML = html; }
async function downloadAllZip() { if (generatedClips.length===0) return; const zip = new JSZip(); const media = zip.folder('media'); for (const clip of generatedClips) { const b = audioBlobs[clip.ttsIndex]; if(b) media.file(clip.audioFile, b); } zip.file('mapping.json', JSON.stringify({clips:generatedClips}, null, 2)); downloadBlob(await zip.generateAsync({type:'blob'}), 'tts_output.zip'); }
function downloadBlob(blob, filename) { const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download=filename; a.click(); URL.revokeObjectURL(u); }

function renderVrewPreview() {
    const area = document.getElementById('vrewPreview');
    if (generatedClips.length === 0) { area.innerHTML = '<p style="color:#888;">먼저 3번 탭에서 오디오를 뽑아주세요.</p>'; return; }
    let html = '<p style="color:#2ecc71; margin-bottom:10px;">✅ 총 '+generatedClips.length+'개 파일 매칭 완료! 아래 버튼을 눌러 VREW로 내보내세요.</p>';
    area.innerHTML = html;
}
async function generateVrew() {
    if (generatedClips.length === 0) { alert('먼저 TTS를 생성하세요!'); return; }
    const sorted = [...generatedClips].sort((a,b) => a.ttsIndex.localeCompare(b.ttsIndex));
    const res = document.getElementById('vrewRes').value.split('x'); const width = parseInt(res[0]), height = parseInt(res[1]);
    const volume = parseFloat(document.getElementById('vrewVol').value); const fontFamily = document.getElementById('vrewFont').value; const fontSize = parseInt(document.getElementById('vrewFontSize').value); const fontColor = document.getElementById('vrewFontColor').value;
    const files = [], clips = [], tracks = {}, assets = {}, ttsClipInfosMap = {}; let currentTime = 0;
    files.push({ mediaId:"00000000-0000-0000-0000", name:"dummy.mp4", duration:Math.ceil(totalDuration+10), mimeType:"video/mp4", type:"video", videoAudioMetaInfo:{sampleRate:48000,channels:2,sampleFormat:2,codec:"aac"}, sourceFileType:"videoFile", fileLocation:"relative", width, height, frameRate:{num:30,den:1} });
    for (const clip of sorted) {
        const mid=`tts-${clip.ttsIndex}`,tid=`track-${clip.ttsIndex}`,aid=`asset-${clip.ttsIndex}`,sid=`scene-${clip.ttsIndex}`;
        files.push({ mediaId:mid, name:clip.audioFile, duration:clip.duration, mimeType:"audio/mpeg", type:"audio", videoAudioMetaInfo:{sampleRate:24000,channels:1,sampleFormat:2,codec:"mp3"}, sourceFileType:"ttsFile", fileLocation:"relative" });
        clips.push({ sceneId:sid, source:{mediaId:"00000000-0000-0000-0000",trackId:0,startTime:currentTime,endTime:currentTime+clip.duration}, words:[{word:clip.text,duration:clip.duration,start:0,type:7}], captions:[{text:clip.text,startTime:0,endTime:clip.duration,style:{fontFamily,fontSize,fontColor,backgroundColor:"#000000",backgroundOpacity:0.6,position:"bottom",bold:true}}] });
        tracks[tid]={type:"ttsClip",mediaId:mid,startTime:currentTime,endTime:currentTime+clip.duration,volume,mute:false};
        assets[aid]={type:"audio",mediaId:mid,trackId:tid,startTime:currentTime,endTime:currentTime+clip.duration};
        ttsClipInfosMap[sid]={ttsClipInfo:{speaker:clip.speaker,emotion:clip.emotion,voice:clip.voice,text:clip.text}};
        currentTime += clip.duration;
    }
    const projectJson = { version:16, files, transcript:{clips,totalDuration:currentTime}, props:{tracks,assets,ttsClipInfosMap}, setting:{resolution:{width,height},frameRate:{num:30,den:1}} };
    const zip = new JSZip(); zip.file('project.json', JSON.stringify(projectJson, null, 2)); const media = zip.folder('media');
    media.file('dummy.mp4', new Blob([new ArrayBuffer(100)], {type:'video/mp4'}));
    for (const clip of sorted) { const b=audioBlobs[clip.ttsIndex]; if(b) media.file(clip.audioFile, b); }
    downloadBlob(await zip.generateAsync({type:'blob'}), 'gd_youtube_story.vrew');
    addLog('🎉 VREW 파일 생성 끝! 더블클릭해서 열어보세요!', 'ok');
}
